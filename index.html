const TR={
ground_fault:{title:'Ground Fault',ico:'⚡',desc:'SLC loop or NAC ground fault isolation',isNew:false,start:'q1',nodes:{q1:{q:'Where is the ground fault indicated on the panel?',type:'ch',opts:[{l:'SLC / IDC Loop',n:'q2'},{l:'NAC Circuit',n:'qn1'},{l:'Multiple / not sure',n:'qm'}]},q2:{q:'Does the panel show a specific device address for the fault?',type:'ch',opts:[{l:'Yes — specific address shown',n:'q3a'},{l:'Loop number only',n:'q3l'},{l:'No detail / system fault',n:'q3l'}]},q3a:{q:'Go to that device address on-site. Is the device properly seated in its base?',type:'yn',y:'q4s',n:'rreseat'},q4s:{q:'Inspect the device base and nearby junction box. Any visible wire damage, moisture, or bare conductors touching metal?',type:'yn',y:'rrepair',n:'q5h'},q3l:{q:'Disconnect the loop wiring at the midpoint (half the devices). Did the fault clear?',type:'yn',y:'q6h',n:'q7o'},q6h:{q:'Fault is in the first half. Continue halving that segment. Can you identify the specific zone?',type:'yn',y:'rrepair',n:'rrepair'},q7o:{q:'Fault in second half or at panel. Disconnect ALL field wiring at panel terminals. Does fault clear?',type:'yn',y:'rfield',n:'rpanel'},q5h:{q:'Disconnect the loop at its midpoint. Did the ground fault clear?',type:'yn',y:'q6h',n:'q7o'},qn1:{q:'Any water exposure or recent construction in that circuit area?',type:'yn',y:'rmoist',n:'qn2'},qn2:{q:'Disconnect NAC at panel terminals. Does the fault clear?',type:'yn',y:'rnacf',n:'rnacp'},qm:{q:'Multiple simultaneous faults often indicate water event or systemic wiring issue. Known flood or recent construction?',type:'yn',y:'rwater',n:'rsys'},rreseat:{type:'res',title:'Reseat Device',body:'Remove and firmly reseat device in its base. Ensure locking tab engages. Clear fault at panel.\n\nIf fault returns after reseating, swap the device with a known-good spare.',parts:['Replacement device (same model and address)'],sev:'low'},rrepair:{type:'res',title:'Wiring Repair Required',body:'Fault zone located. Inspect all conductors in this area for:\n• Abraded or pinched insulation\n• Conductors touching metallic conduit or boxes\n• Moisture inside a junction box\n\nRepair or replace damaged wiring. Re-test the full loop after repair.',parts:['Wire (matching gauge)','Wire nuts or terminal blocks','Electrical tape or heat shrink'],sev:'med'},rfield:{type:'res',title:'Fault Confirmed in Field Wiring',body:'All field wiring removed and fault cleared — confirmed wiring issue, not a panel fault.\n\nContinue halving the circuit to pinpoint the specific run. Inspect all devices and junction boxes in that segment.',parts:['Wire','Replacement devices if needed'],sev:'med'},rpanel:{type:'res',title:'Possible Panel / Loop Card Issue',body:'Fault persists even with all field wiring removed. Panel-side issue:\n• Check loop card seating\n• Inspect loop card terminals for corrosion\n• Contact panel manufacturer tech support\n\nDo NOT restore system until fault is resolved.',parts:['Replacement loop card (if available)'],sev:'high'},rmoist:{type:'res',title:'Moisture-Related Ground Fault',body:'Moisture is the likely cause. Inspect all junction boxes and device housings on this NAC circuit.\n\nLook for standing water, corrosion, or wet insulation. Replace affected devices — allow wiring to dry completely before restoring.',parts:['Replacement horn/strobe if corroded','Weatherproof junction box covers'],sev:'med'},rnacf:{type:'res',title:'NAC Field Wiring Fault',body:'Fault is in NAC field wiring. Disconnect appliances in segments to isolate the fault zone. Check behind each device for conductor damage.',parts:['Wire','EOL resistor (correct value)'],sev:'med'},rnacp:{type:'res',title:'Panel NAC Circuit Issue',body:'Fault remains with field wiring disconnected. NAC circuit output on panel may be faulty.\n\nCheck NAC module/card seating. Escalate to senior tech or manufacturer support.',parts:['NAC module (if replaceable)'],sev:'high'},rwater:{type:'res',title:'Water / Flood Event',body:'Multiple faults from water require a systematic response:\n1. Place system in alarm inhibit if life safety not compromised\n2. Notify building management and AHJ immediately\n3. Inspect all accessible boxes and devices in affected areas\n4. Replace all wet devices — never dry and reuse\n5. Document all findings',parts:['Multiple replacement devices','Wire','Junction box replacements'],sev:'high'},rsys:{type:'res',title:'Multiple Faults — Escalate',body:'Multiple simultaneous ground faults without obvious cause suggest serious wiring problem or loop card failure.\n\nEscalate to senior tech. Document all active faults before disconnecting anything.',parts:[],sev:'high'}}},
open_circuit:{title:'Open Circuit',ico:'🔌',desc:'Locate and repair a broken conductor',isNew:false,start:'q1',nodes:{q1:{q:'Which type of circuit has the open fault?',type:'ch',opts:[{l:'SLC / Addressable Loop',n:'q2'},{l:'Conventional Zone (IDC)',n:'qc1'},{l:'NAC Circuit',n:'qn1'}]},q2:{q:'Check panel terminals first. Are all SLC wiring terminations tight and undamaged?',type:'yn',y:'q3',n:'rterm'},q3:{q:'Does the panel show a specific device address for the open fault?',type:'yn',y:'q4d',n:'q4l'},q4d:{q:'Go to that device. Is it seated in its base with wires properly terminated?',type:'yn',y:'q5',n:'rbase'},q5:{q:'Check adjacent devices on the loop. Is one physically absent or clearly damaged?',type:'yn',y:'rdevice',n:'q6'},q6:{q:'Use a continuity tester or wire tracer. Can you confirm a specific wire break location?',type:'yn',y:'rwire',n:'rtrace'},q4l:{q:'Disconnect loop at midpoint. Does the open clearly affect only one half?',type:'yn',y:'rwire',n:'qcp'},qcp:{q:'Is the loop configured as Class A (Style 6/7) or Class B (Style 4)?',type:'ch',opts:[{l:'Class A — both legs showing open',n:'rclassa'},{l:'Class B',n:'rtrace'},{l:'Not sure',n:'rtrace'}]},qc1:{q:'Is the EOL resistor present at the last device on this zone?',type:'yn',y:'qc2',n:'reol'},qc2:{q:'Measure resistance at zone terminals on panel (wiring connected). Reading is:',type:'ch',opts:[{l:'Infinite / OL (open)',n:'rwire'},{l:'Correct EOL value',n:'rpzone'},{l:'Zero / short',n:'rshort'}]},qn1:{q:'Is the EOL resistor present with correct value at end of NAC circuit?',type:'yn',y:'qn2',n:'reol'},qn2:{q:'Disconnect NAC at panel. Measure circuit resistance. Shows open (infinite)?',type:'yn',y:'rwire',n:'rnacp'},rterm:{type:'res',title:'Re-Terminate Panel Wiring',body:'Loose or damaged wiring at panel terminals is the single most common cause of open faults.\n\nRe-terminate all connections on the affected circuit. Use correct torque spec for the terminal type.',parts:['None typically needed'],sev:'low'},rbase:{type:'res',title:'Device Base Wiring Issue',body:'A wire has come loose at the device base. Re-terminate the conductor and ensure the screw is properly torqued.\n\nIf the base contact plate is visibly damaged, replace the base.',parts:['Device base (if damaged)'],sev:'low'},rdevice:{type:'res',title:'Failed or Missing Device',body:'A device on the loop is absent or failing internally.\n\nSwap the suspect device with a known-good spare of the same model. Match the address exactly.',parts:['Replacement detector or module (correct model)'],sev:'med'},rwire:{type:'res',title:'Wire Break Found',body:'A conductor is broken. Locate the exact break point:\n• At a junction box connection\n• At a device base terminal\n• In the wire run (stapling, crushing, rodents)\n\nRepair by splicing (NFPA 72 approved method) or pull new wire.',parts:['Wire (matching gauge)','Wire nuts or Wago connectors'],sev:'med'},rtrace:{type:'res',title:'Full Circuit Trace Required',body:'Break location is not immediately apparent.\n\nUse a wire tracer/tone generator to follow the circuit from panel to end of line. Inspect every accessible junction box and device base.',parts:['Tone generator / wire tracer (tool)'],sev:'med'},rclassa:{type:'res',title:'Class A Open — Both Paths Faulting',body:'On a Class A loop, open on both legs indicates a break between two devices. The panel may show which addresses bracket the break.\n\nInspect that wiring segment carefully.',parts:['Wire','Junction box connectors'],sev:'med'},reol:{type:'res',title:'Missing or Wrong EOL Device',body:'End-of-line resistor is missing or incorrect — this is a code deficiency.\n\n1. Verify correct EOL value from panel documentation\n2. Install EOL resistor at last device on circuit\n3. Verify fault clears\n\nDocument in inspection record.',parts:['EOL resistor (correct ohm value per panel specs)'],sev:'low'},rpzone:{type:'res',title:'Panel Zone Board Issue',body:'Wiring resistance reads correct but panel still shows fault. Zone input card may have failed.\n\nTry mapping to a spare zone input and reprogramming. Escalate if issue continues.',parts:['Zone input module (if replaceable)'],sev:'high'},rshort:{type:'res',title:'Short Circuit on Zone',body:'Zero resistance indicates a short, not an open.\n\nReturn to the main diagnostic menu and select the appropriate short circuit or NAC fault tree.',parts:[],sev:'med'},rnacp:{type:'res',title:'Panel NAC Output Issue',body:'Field wiring tests correct but fault remains. NAC output circuit on panel may have failed.\n\nCheck NAC output module seating and connections. Escalate to senior tech.',parts:['NAC module'],sev:'high'}}},
battery_trouble:{title:'Battery Trouble',ico:'🔋',desc:'Diagnose and resolve battery fault conditions',isNew:false,start:'q1',nodes:{q1:{q:'Is the panel also showing an AC LOSS or AC FAIL fault at the same time?',type:'yn',y:'qac',n:'q2'},qac:{q:'Check the panel dedicated breaker in the electrical room. Is it tripped?',type:'yn',y:'rbreaker',n:'qac2'},qac2:{q:'Is the building experiencing a utility power outage right now?',type:'yn',y:'rutility',n:'racwire'},q2:{q:'How old is the battery? (Check date code sticker on the battery)',type:'ch',opts:[{l:'Less than 3 years',n:'q3'},{l:'3 to 5 years',n:'qborder'},{l:'Over 5 years or unknown',n:'rage'}]},q3:{q:'Measure battery voltage with multimeter (panel running on AC). Voltage reads:',type:'ch',opts:[{l:'Below 24V',n:'rfailed'},{l:'24V to 26V — marginal',n:'qload'},{l:'Above 26.5V — healthy',n:'qconn'}]},qload:{q:'Load test: disconnect AC, let battery power panel 5 minutes. Does voltage stay above 22V?',type:'yn',y:'rcharger',n:'rfailed'},qconn:{q:'Battery voltage is healthy. Are terminal connections clean, tight, and corrosion-free?',type:'yn',y:'rcharger',n:'rterm'},qborder:{q:'3–5 year battery is borderline. Under load, does voltage stay above 24V?',type:'yn',y:'rmonitor',n:'rage'},rbreaker:{type:'res',title:'Tripped Breaker',body:'Reset the dedicated FA panel breaker. Verify it holds after reset.\n\nIf it trips again, do not continue resetting — a wiring fault may exist. Escalate.\n\nAfter restoring AC: verify panel charges battery and returns to normal within 1 hour.',parts:[],sev:'med'},rutility:{type:'res',title:'Utility Power Outage',body:'Building is on a utility outage. Panel is operating on battery backup — normal per NFPA 72.\n\n⚠️ NFPA 72 requires 24-hour standby + 5 min full alarm. If outage exceeds 4 hours, notify monitoring company.\n\nDocument outage start time in job notes.',parts:[],sev:'low'},racwire:{type:'res',title:'Check AC Input Wiring',body:'AC not restored by breaker reset and no utility outage. Inspect AC input terminals on panel for loose connections.\n\nVerify transformer output voltage. If AC input is correct but panel shows AC loss — suspect panel power supply failure. Escalate.',parts:['Panel power supply (if applicable)'],sev:'high'},rage:{type:'res',title:'Replace Battery — Age',body:'Battery is past reliable service life. Replace with correct battery per panel specifications:\n\n• Match AH rating — check panel nameplate\n• Match voltage (typically 12V × 2 in series = 24V)\n• Common sizes: 7AH, 12AH, 18AH, 26AH\n\nVerify charging voltage is 26.5–27.6V after replacement.',parts:['Replacement batteries (correct AH × 2)'],sev:'low'},rfailed:{type:'res',title:'Battery Failed — Replace Immediately',body:'Battery is below minimum voltage. Replace immediately:\n\n1. Note battery model and AH rating\n2. Replace BOTH batteries — always as a matched pair\n3. Verify charging voltage after replacement (26.5–27.6V)\n4. Clear fault and confirm panel returns to normal\n\n⚠️ Per NFPA 72, a failed battery is a system impairment. Notify monitoring company.',parts:['Replacement batteries (correct AH × 2)','Battery terminal cleaner if corroded'],sev:'high'},rcharger:{type:'res',title:'Check Charger Output',body:'Battery is healthy but trouble persists.\n\n• Measure DC voltage at battery terminals: should read 26.5–27.6V\n• If low or absent, panel charger circuit may be failing\n• Escalate if charger voltage is incorrect',parts:['Panel power supply (if charger failed)'],sev:'med'},rterm:{type:'res',title:'Clean Battery Terminals',body:'Corroded or loose terminals cause false trouble signals.\n\nClean terminals with wire brush and battery terminal cleaner. Re-tighten firmly. Clear fault.\n\nIf fault persists after cleaning, replace the battery.',parts:['Battery terminal cleaner','Wire brush'],sev:'low'},rmonitor:{type:'res',title:'Battery Marginal — Monitor or Replace',body:'Battery passes current load test but is borderline at 3–5 years. May fail under extended outage.\n\nRecommend proactive replacement at this visit. Document in notes and inform customer.',parts:['Replacement batteries (correct AH × 2) — if approved'],sev:'low'}}},
false_alarm:{title:'False Alarm Investigation',ico:'🚨',desc:'Systematic investigation of an unwanted alarm',isNew:false,start:'q1',nodes:{q1:{q:'What type of initiating device activated?',type:'ch',opts:[{l:'Smoke detector',n:'qs1'},{l:'Heat detector',n:'qh1'},{l:'Manual pull station',n:'qp1'},{l:'Duct detector',n:'qd1'},{l:'Unknown',n:'qu'}]},qs1:{q:'Was any of the following present near the detector when it activated?',type:'ch',opts:[{l:'Dust / construction activity',n:'rdust'},{l:'Steam / humidity / cooking',n:'rsteam'},{l:'Possible insects in detector',n:'rinsect'},{l:'None of the above',n:'qs2'}]},qs2:{q:'Is this detector in a high-contamination area (kitchen, warehouse, shop floor)?',type:'yn',y:'rdirty',n:'qs3'},qs3:{q:'Is the detector sensitivity reading accessible on the panel? Is it outside listed range?',type:'yn',y:'rsens',n:'rreplsm'},qh1:{q:'Is the ambient temperature in that space unusually high (above 100°F)?',type:'yn',y:'rheatenv',n:'qh2'},qh2:{q:'Is the heat detector near HVAC discharge, a heating unit, or direct sunlight through glass?',type:'yn',y:'rheatloc',n:'rreplht'},qp1:{q:'Inspect the pull station. Is there evidence it was physically activated (handle pulled, glass broken)?',type:'yn',y:'rpullact',n:'rpullmal'},qd1:{q:'Was the HVAC system recently serviced, filters changed, or ductwork cleaned?',type:'yn',y:'rductserv',n:'qd2'},qd2:{q:'Check duct detector sampling tubes. Are they clear and properly seated in the duct?',type:'yn',y:'rductdirty',n:'rducttubes'},qu:{q:'Pull the event log from the panel. Can you identify which device activated?',type:'yn',y:'rchecklog',n:'rescunk'},rdust:{type:'res',title:'Dust / Construction Contamination',body:'Dust accumulation in detector chamber is a leading cause of false alarms during renovation.\n\n1. Clean detector with compressed air\n2. Check sensitivity reading — if out of range, replace detector\n3. Consider temporarily replacing with a heat detector during active construction\n4. Install dust covers and notify the GC\n\nDocument: cause, device address, corrective action.',parts:['Compressed air','Replacement smoke detector if needed','Temporary heat detector'],sev:'low'},rsteam:{type:'res',title:'Steam / Humidity / Cooking Aerosols',body:'Environmental false alarm — moisture or cooking aerosols triggered the detector.\n\n1. Inspect detector for moisture or residue\n2. Discuss placement with customer — may need relocation\n3. Consider different technology or a heat detector\n4. Clean detector, clear alarm, and verify\n\nRepeated false alarms from same device may require a system modification notice to AHJ.',parts:['Replacement detector if contaminated'],sev:'low'},rinsect:{type:'res',title:'Insect-Triggered Alarm',body:'Insects (especially spiders) inside detector chamber can trigger the sensing element.\n\n1. Remove detector from base\n2. Inspect chamber for insects or webs\n3. Clean thoroughly with compressed air\n4. Replace detector if chamber is heavily contaminated',parts:['Replacement detector','Compressed air'],sev:'low'},rdirty:{type:'res',title:'Contaminated Environment',body:'Detector is in an environment incompatible with standard smoke sensing.\n\n1. Clean current detector and document\n2. Recommend relocating detector or using different sensing technology\n3. For warehouses/kitchens: consider heat detector or projected beam detector\n\nFrequent false alarms require an engineering review.',parts:['Replacement heat or beam detector (if approved)'],sev:'med'},rsens:{type:'res',title:'Detector Out of Sensitivity Range',body:'Detector sensitivity is outside its listed and approved range. Per NFPA 72, detectors must be maintained within listed sensitivity limits.\n\n1. Replace the detector\n2. Note the replacement in the inspection record\n3. If multiple detectors are drifting, assess cleaning and replacement schedule',parts:['Replacement smoke detector (correct model)'],sev:'med'},rreplsm:{type:'res',title:'Replace Suspect Detector',body:'No environmental cause identified. Detector may be failing internally.\n\n1. Replace with new unit of same model\n2. Verify address programmed correctly\n3. Test new detector with canned smoke\n4. Monitor for recurrence at this address',parts:['Replacement smoke detector (correct model and address)'],sev:'med'},rheatenv:{type:'res',title:'High Temperature Environment',body:'Verify heat detector temperature rating is appropriate for this space.\n\nStandard fixed temp detectors are rated at 135°F or 194°F. If ambient temps approach the rating, nuisance trips will occur.\n\n• Check detector temperature rating on label\n• If environment runs hot, upgrade to a higher-rated detector',parts:['Higher temp-rated heat detector if needed'],sev:'med'},rheatloc:{type:'res',title:'Heat Detector Placement Issue',body:'Direct HVAC discharge or radiant heat sources can trigger rate-of-rise detectors falsely.\n\n1. Relocate detector away from heat source\n2. Use fixed-temp only detector if rate-of-rise is problematic\n3. Shield detector from direct discharge if relocation not possible\n\nDocument placement recommendations in writing to customer.',parts:['Replacement detector (fixed temp vs. rate-of-rise)'],sev:'med'},rreplht:{type:'res',title:'Replace Heat Detector',body:'No environmental cause found. Heat detector may have failed internally.\n\nReplace with identical model, verify address, and test with heat gun per manufacturer method.',parts:['Replacement heat detector (correct model)'],sev:'med'},rpullact:{type:'res',title:'Pull Station Was Physically Activated',body:'The pull station was operated — intentional, prank, test, or accidental.\n\n1. Reset pull station (key or cover reset per model)\n2. Verify no actual emergency condition exists\n3. Advise customer to review incident — may need to notify AHJ\n4. Document in job notes',parts:['Pull station reset key (if needed)'],sev:'low'},rpullmal:{type:'res',title:'Pull Station Malfunction',body:'No evidence of physical activation — pull station may have failed internally.\n\n1. Disconnect pull station and check if alarm clears\n2. Replace pull station with matching model\n3. Verify circuit normal after replacement',parts:['Replacement pull station (correct model)'],sev:'med'},rductserv:{type:'res',title:'Post-HVAC Service False Alarm',body:'Ductwork service commonly dislodges dust into the airstream, triggering duct detectors.\n\n1. Clean duct detector and sampling tubes\n2. Verify sampling tube ports are clear and aligned\n3. Reset and test duct detector with smoke\n4. Advise HVAC contractor to notify FA contractor before future duct work',parts:['Compressed air','Duct detector cleaning kit'],sev:'low'},rductdirty:{type:'res',title:'Duct Detector Contaminated',body:'Duct detector is contaminated from airborne particles over time.\n\n1. Remove and clean sensing chamber thoroughly\n2. Check and clear sampling tubes\n3. Test with canned smoke after cleaning\n4. If sensitivity is out of range, replace the detector',parts:['Duct detector cleaning kit','Replacement duct detector if needed'],sev:'med'},rducttubes:{type:'res',title:'Duct Detector Sampling Tube Issue',body:'Sampling tubes are not properly seated or have blockages:\n\n1. Remove detector housing and inspect sampling tubes\n2. Clear any obstructions from tube openings\n3. Ensure tubes are aligned with airflow — inlet tube faces upstream\n4. Replace tubes if cracked or deformed',parts:['Duct detector sampling tube replacement kit'],sev:'med'},rchecklog:{type:'res',title:'Review Event Log — Device Identified',body:'Device identified from event log.\n\n1. Note device address, type, and location description\n2. Navigate to that device physically\n3. Return to diagnostic menu and select the tree matching that device type',parts:[],sev:'low'},rescunk:{type:'res',title:'Unknown Source — Escalate',body:'Cannot identify activating device from event log.\n\n1. Check if event log was overwritten\n2. Manually test each device in the affected zone\n3. Escalate to senior tech if cause cannot be identified\n4. Document all steps taken and notify monitoring company',parts:[],sev:'high'}}},
slc_comm:{title:'SLC Comm Fault',ico:'📡',desc:'Addressable device communication loss',isNew:true,start:'q1',nodes:{q1:{q:'How many devices are showing communication fault on the panel?',type:'ch',opts:[{l:'Single device — specific address shown',n:'q_single'},{l:'Multiple devices on same loop',n:'q_multi'},{l:'All devices on a loop',n:'q_all'}]},q_single:{q:'Go to the physical location of that device address. Is the device present and seated in its base?',type:'yn',y:'q_seated',n:'r_missing'},q_seated:{q:'Check the address dial or dip switches on the device. Do they match the address shown on the panel?',type:'yn',y:'q_wiring',n:'r_addr'},q_wiring:{q:'Inspect wiring at the device base and nearby junction box. Is all wiring properly terminated?',type:'yn',y:'q_swap',n:'r_base_wire'},q_swap:{q:'Swap the device with a known-good spare of the same model. Does the comm fault clear?',type:'yn',y:'r_device_fail',n:'r_loop_seg'},q_multi:{q:'Are all faulting devices on the same SLC loop number?',type:'yn',y:'q_conflict',n:'r_multi_loops'},q_conflict:{q:'Check the panel event log for DUPLICATE ADDRESS warnings. Is there an address conflict?',type:'yn',y:'r_dup_addr',n:'q_loop_card'},q_loop_card:{q:'Is the SLC loop card properly seated in its slot?',type:'yn',y:'q_half_loop',n:'r_reseat_card'},q_half_loop:{q:'Disconnect the loop at the midpoint. Do the comm faults resolve on one half of the loop?',type:'yn',y:'r_wire_seg',n:'r_loop_card_fail'},q_all:{q:'With ALL devices on the loop showing comm fault, check the loop card. Is it properly seated and showing no physical damage?',type:'yn',y:'q_loop_power',n:'r_reseat_card'},q_loop_power:{q:'Check DC voltage at the SLC terminals on the panel (loop power). Is voltage present (typically 24–28V DC)?',type:'yn',y:'r_loop_wire_break',n:'r_no_loop_power'},r_missing:{type:'res',title:'Device Physically Absent',body:'No device is present at that address.\n\n1. Check service history — was device removed intentionally?\n2. If removed without authorization, investigate and reinstall\n3. If removed for replacement, install correct device and verify address\n4. If base is damaged, replace base before installing device',parts:['Replacement device (correct model and address)'],sev:'med'},r_addr:{type:'res',title:'Device Address Mismatch',body:'Device address does not match the panel programming.\n\n1. Correct the address dial or dip switches on the device to match the panel\n2. OR reprogram the panel address to match the device\n3. Do NOT change addresses randomly — cross-reference the device list\n4. Clear fault and run a device test after correction',parts:[],sev:'low'},r_base_wire:{type:'res',title:'Device Base Wiring Issue',body:'Loose or improperly terminated wiring at the device base is interrupting communication.\n\n1. Re-terminate all wires at the device base\n2. Verify correct polarity (check panel wiring legend for SLC terminals)\n3. Inspect the base contact plate for corrosion or damage\n4. Replace base if contact plates are damaged',parts:['Device base (if damaged)'],sev:'low'},r_device_fail:{type:'res',title:'Device Failed Internally',body:'The replacement cleared the fault — the original device has failed internally.\n\n1. Program the replacement device to the correct address\n2. Run a device test (smoke/heat activation) to verify\n3. Document replacement in service notes\n4. Return failed device for warranty/analysis if applicable',parts:['Replacement device (same model)'],sev:'med'},r_loop_seg:{type:'res',title:'Fault in Loop Wiring Near Device',body:'Device tests good but fault persists. The wiring segment near this device address is suspect.\n\n1. Check wiring continuity between this device and adjacent addresses\n2. Inspect all junction boxes and conduit entries in this segment\n3. Look for a staple, pinch, or connector failure disrupting the SLC signal',parts:['Wire','Junction box connectors'],sev:'med'},r_multi_loops:{type:'res',title:'Devices on Multiple Loops Faulting',body:'Devices on different loops faulting simultaneously points to a panel-level issue.\n\n1. Check panel power supply output voltage\n2. Reseat all loop cards\n3. Check for recent programming changes that may have caused address conflicts\n4. Escalate — this pattern often indicates a panel board issue',parts:[],sev:'high'},r_dup_addr:{type:'res',title:'Duplicate Device Address',body:'Two or more devices are set to the same address on the same loop.\n\n1. Use the panel\'s point scan or device scan to find all devices on the loop\n2. Walk the loop with the device list and verify every address\n3. Correct any duplicate by changing the address on one device\n4. Re-poll the loop and verify all addresses are unique',parts:[],sev:'med'},r_reseat_card:{type:'res',title:'Reseat Loop Card',body:'The SLC loop card may be loose, causing communication failure with all devices on that loop.\n\n1. Power down the panel (follow manufacturer lockout procedure)\n2. Remove and firmly reseat the loop card in its slot\n3. Restore power and observe — loop should re-poll\n4. If fault persists after reseating, loop card may have failed — escalate',parts:['Replacement loop card (if available)'],sev:'med'},r_wire_seg:{type:'res',title:'Fault in Loop Wiring Segment',body:'Fault is isolated to one half of the loop. Continue halving to locate the specific fault.\n\n1. Disconnect at the midpoint of the faulting half\n2. Continue until you isolate the specific segment\n3. Inspect all junction boxes and device bases in the faulting segment\n4. Repair open circuit, short, or ground fault as found',parts:['Wire','Junction box connectors'],sev:'med'},r_loop_card_fail:{type:'res',title:'Loop Card Failure',body:'Comm faults on both halves with loop card properly seated suggests loop card hardware failure.\n\n1. Check loop card for visible burn marks, corrosion, or physical damage\n2. Try replacing loop card with a known-good spare if available\n3. Escalate — loop card replacement requires programming re-download on some panels\n4. Contact panel manufacturer tech support',parts:['Replacement loop card'],sev:'high'},r_loop_wire_break:{type:'res',title:'Loop Wire Break — All Devices Down',body:'Loop power present at panel but all devices offline — total loop open circuit likely near the panel output.\n\n1. Check the first device on the loop — is it responding?\n2. Inspect wiring between panel SLC terminals and the first junction box\n3. Class B loop: single break takes down all devices past the break\n4. Class A loop: total failure means breaks on BOTH paths',parts:['Wire','Junction box connectors'],sev:'high'},r_no_loop_power:{type:'res',title:'No Loop Power at Panel',body:'SLC loop power is absent at panel terminals — panel-level issue.\n\n1. Check loop card seating and visually inspect for damage\n2. Check for blown fuses or PTC thermal fuses on the loop card\n3. Measure voltage at loop card input terminals — is panel supply voltage present?\n4. Escalate — loop card or panel power supply likely needs replacement',parts:['Loop card','Panel power supply fuses'],sev:'high'}}},
supervisory:{title:'Supervisory Input',ico:'🔵',desc:'Tamper, waterflow, and valve supervisory signals',isNew:true,start:'q1',nodes:{q1:{q:'What type of supervisory signal is showing on the panel?',type:'ch',opts:[{l:'Tamper (device or enclosure)',n:'qt1'},{l:'Waterflow (flow switch)',n:'qw1'},{l:'Valve position (OS&Y, PIV)',n:'qv1'},{l:'Low air / pressure supervisory',n:'qp1'}]},qt1:{q:'Go to the device showing tamper. Is the tamper switch physically open? (cover off, enclosure open)',type:'yn',y:'qt2',n:'qt_sw_fail'},qt2:{q:'Is the open tamper intentional — is someone actively working on that device or enclosure?',type:'yn',y:'r_tamper_active',n:'qt3'},qt3:{q:'Secure the device cover or enclosure. Does the supervisory clear within 30 seconds?',type:'yn',y:'r_tamper_clear',n:'qt4'},qt4:{q:'Tamper does not clear even with cover secured. Is the tamper switch visibly damaged or stuck open?',type:'yn',y:'r_tamper_replace',n:'qt_wiring'},qt_sw_fail:{q:'Tamper switch appears seated but supervisory persists. Check tamper switch continuity with multimeter. Does switch show continuity when cover is closed?',type:'yn',y:'qt_wiring',n:'r_tamper_replace'},qt_wiring:{q:'Check wiring at the tamper input back at the panel. Is the tamper wiring connection secure?',type:'yn',y:'r_tamper_panel',n:'r_tamper_wire'},qw1:{q:'Is there potentially actual water flowing in the sprinkler system right now? (Check audible flow, pressure gauge movement)',type:'yn',y:'qw_real',n:'qw2'},qw_real:{q:'Is the flow from an open sprinkler head, a leak, or an uncoordinated system test?',type:'ch',opts:[{l:'Open sprinkler head',n:'r_flow_sprinkler'},{l:'System leak',n:'r_flow_leak'},{l:'Uncoordinated test',n:'r_flow_test'}]},qw2:{q:'Check the retard chamber setting on the flow switch. Is the retard period set very short (under 10 seconds)?',type:'yn',y:'r_flow_retard',n:'qw3'},qw3:{q:'Inspect the flow switch paddle and switch body. Is there any physical damage or paddle obstruction?',type:'yn',y:'r_flow_switch',n:'qw4'},qw4:{q:'Was there a water pressure surge recently (pump test, city main work, system just restored)?',type:'yn',y:'r_flow_surge',n:'r_flow_switch'},qv1:{q:'Go to the valve showing supervisory. Is the valve in the incorrect (closed or partially closed) position?',type:'yn',y:'r_valve_closed',n:'qv2'},qv2:{q:'The valve appears fully open. Is the tamper switch on the valve body properly engaged and making contact?',type:'yn',y:'r_valve_switch',n:'r_valve_adjust'},qp1:{q:'Check the actual air/water pressure at the affected system. Is the pressure below the supervisory setpoint?',type:'yn',y:'r_pressure_real',n:'r_pressure_switch'},r_tamper_active:{type:'res',title:'Active Work in Progress',body:'Tamper is open due to authorized work.\n\n1. Verify the work is authorized\n2. Document the open tamper and reason in job notes\n3. Notify monitoring company that a supervisory is active during work\n4. Ensure tamper is restored when work is complete',parts:[],sev:'low'},r_tamper_clear:{type:'res',title:'Tamper Restored — Cleared',body:'Securing the device cover cleared the supervisory — this was a legitimate tamper condition.\n\n1. Identify what caused the cover to be open\n2. Document the finding in job notes\n3. Advise customer to secure all panel and device enclosures\n4. Confirm monitoring company received and cleared the supervisory',parts:[],sev:'low'},r_tamper_replace:{type:'res',title:'Replace Tamper Switch',body:'Tamper switch is physically damaged or will not make contact when cover is closed.\n\n1. Replace the tamper switch or tamper switch assembly\n2. Test by opening and closing cover — supervisory should activate and clear accordingly\n3. If tamper is built into the device body, replace the entire device',parts:['Replacement tamper switch or device'],sev:'med'},r_tamper_wire:{type:'res',title:'Tamper Wiring Issue',body:'Tamper switch is functional but wiring between switch and panel is broken.\n\n1. Check all connections from tamper switch back to tamper input on panel\n2. Common failure points: terminal at device, splice in run, tamper input terminal at panel\n3. Repair or re-terminate as needed',parts:['Wire','Terminal connectors'],sev:'med'},r_tamper_panel:{type:'res',title:'Panel Tamper Input Issue',body:'Tamper wiring checks out but supervisory persists. The tamper input on the panel may have failed.\n\n1. Verify tamper input wiring resistance\n2. Try mapping to a spare tamper input if available\n3. Escalate if issue persists',parts:[],sev:'high'},r_flow_sprinkler:{type:'res',title:'Open Sprinkler Head',body:'An open sprinkler head is causing actual waterflow — immediate action required.\n\n1. Confirm fire is extinguished or head opened accidentally\n2. Close the isolation valve for that branch\n3. Replace the open sprinkler head\n4. Restore system pressure and verify flow switch clears\n5. Notify AHJ — open sprinkler head requires documentation\n\n⚠️ Do NOT restore system to service until open head is replaced and system is pressurized.',parts:['Replacement sprinkler head (matching rating, temperature, and coverage)'],sev:'high'},r_flow_leak:{type:'res',title:'System Leak Detected',body:'Actual waterflow from a system leak.\n\n1. Close the isolation valve for the leaking section\n2. Locate the leak source (fitting, pipe, head, device)\n3. Repair the leak — notify building management\n4. Restore system pressure and verify flow switch clears\n5. Document and notify AHJ if system was out of service',parts:['Pipe repair fittings or sprinkler head as needed'],sev:'high'},r_flow_test:{type:'res',title:'Uncoordinated System Test',body:'Waterflow alarm triggered by a system test not coordinated with FA/monitoring.\n\n1. Confirm with building management or sprinkler contractor this was a test\n2. Notify monitoring company — confirm signal was a test\n3. Advise building that FA contractor must be notified before any sprinkler testing\n4. Document in job notes',parts:[],sev:'low'},r_flow_retard:{type:'res',title:'Retard Chamber Set Too Short',body:'The retard period is set very short, causing the switch to activate on minor pressure fluctuations.\n\n1. Adjust the retard chamber to a longer setting (typically 30–90 seconds)\n2. Verify the new setting with the AHJ\n3. Test for nuisance trips after adjustment\n4. Document the adjustment in service notes',parts:[],sev:'low'},r_flow_switch:{type:'res',title:'Flow Switch Component Issue',body:'The flow switch itself may be defective — damaged paddle, failed microswitch, or wiring fault.\n\n1. Inspect paddle for debris, damage, or incorrect installation\n2. Test microswitch continuity manually (simulate flow)\n3. Check wiring from switch to panel for loose connections\n4. Replace flow switch if it fails mechanical or electrical test',parts:['Replacement flow switch (matching size and rating)'],sev:'med'},r_flow_surge:{type:'res',title:'Pressure Surge — Momentary Activation',body:'A pressure surge caused a momentary flow that triggered the switch.\n\n1. Confirm the supervisory has cleared now that pressure is stable\n2. If it happens repeatedly, increase the retard chamber setting\n3. Verify pressure reducing valve (PRV) is functioning correctly\n4. Document the surge event in job notes',parts:[],sev:'low'},r_valve_closed:{type:'res',title:'Valve Found Closed',body:'The monitored valve is in the closed or partially closed position — critical life safety condition.\n\n⚠️ A closed sprinkler control valve puts the system out of service.\n\n1. Determine why the valve is closed — authorized impairment or unauthorized?\n2. If no authorized impairment: OPEN THE VALVE IMMEDIATELY\n3. Notify AHJ and monitoring company\n4. Document start and end time of impairment\n5. Confirm supervisory clears and system is restored',parts:[],sev:'high'},r_valve_adjust:{type:'res',title:'Tamper Switch Needs Adjustment',body:'Valve is in correct open position but tamper switch is not making proper contact.\n\n1. Inspect tamper switch arm — is it properly positioned against the valve stem?\n2. Adjust switch mounting or arm position so it makes contact when valve is fully open\n3. Verify supervisory clears with valve fully open\n4. Test that supervisory activates when valve is partially closed',parts:['Tamper switch mounting hardware if needed'],sev:'low'},r_valve_switch:{type:'res',title:'Valve Tamper Switch Failed',body:'Valve is in correct position and switch appears engaged but supervisory persists.\n\n1. Check switch continuity with valve in open position (should show continuity)\n2. If switch is open (no continuity) when valve is open, switch has failed\n3. Replace tamper switch on valve — match to valve size and type',parts:['Replacement valve tamper switch'],sev:'med'},r_pressure_real:{type:'res',title:'Actual Low Pressure Condition',body:'System pressure is genuinely below the supervisory setpoint. Requires investigation.\n\n1. Check for system leaks (visual inspection, pressure decay test)\n2. Verify air compressor is operational (dry pipe/pre-action systems)\n3. Check pressure settings on the air compressor or pressure maintenance pump\n4. Restore pressure to operating range and monitor for recurrence\n\nIf pressure drops repeatedly, there is likely a leak requiring sprinkler contractor.',parts:['Air compressor service if needed'],sev:'high'},r_pressure_switch:{type:'res',title:'Pressure Switch May Be Misadjusted',body:'Actual system pressure is above the supervisory setpoint but alarm is active.\n\n1. Verify pressure switch setpoint — should alarm at ~10–20 PSI below normal operating pressure\n2. Check pressure switch wiring for loose connections\n3. Replace pressure switch if setpoint cannot be corrected',parts:['Replacement pressure switch if needed'],sev:'med'}}},
zone_trouble:{title:'Zone Trouble — Conventional',ico:'📋',desc:'Conventional zone (IDC) fault diagnosis',isNew:true,start:'q1',nodes:{q1:{q:'What type of conventional zone is faulting?',type:'ch',opts:[{l:'Initiating zone (smoke, heat, pull station)',n:'q_init'},{l:'Waterflow / supervisory zone',n:'q_sup'},{l:'Not sure / general zone trouble',n:'q_init'}]},q_init:{q:'Measure resistance at zone terminals on the panel with wiring connected. Reading shows:',type:'ch',opts:[{l:'Infinite / OL — open circuit',n:'q_open'},{l:'Near correct EOL resistance',n:'q_eol_ok'},{l:'Zero or near zero — short',n:'q_short'},{l:'Slightly low — below EOL',n:'q_low'}]},q_open:{q:'Walk to the last device on the zone and check if the EOL resistor is installed.',type:'yn',y:'q_open2',n:'r_eol_missing'},q_open2:{q:'EOL resistor is present. Disconnect zone wiring at panel and measure resistance of field wiring only. Still shows open?',type:'yn',y:'r_wire_break',n:'r_panel_input'},q_eol_ok:{q:'Resistance reads correct but panel shows trouble. Check zone terminals on panel — is wiring securely connected?',type:'yn',y:'r_panel_input',n:'r_panel_terminal'},q_short:{q:'Disconnect all devices on this zone by removing them from their bases. Does the short clear?',type:'yn',y:'q_device_short',n:'r_wiring_short'},q_device_short:{q:'Short is clear with devices disconnected — the short is in a device. Reconnect one at a time to find the faulty device. Found it?',type:'yn',y:'r_device_shorted',n:'r_device_shorted'},q_low:{q:'Slightly low resistance often indicates moisture bridging across insulation. Check for water damage in junction boxes on this zone.',type:'yn',y:'r_moisture_low',n:'q_eol_check'},q_eol_check:{q:'Verify the EOL resistor value matches what the panel expects. Is the EOL value correct?',type:'yn',y:'r_partial_short',n:'r_eol_wrong'},q_sup:{q:'Is this a waterflow or a tamper/valve supervisory zone?',type:'ch',opts:[{l:'Waterflow',n:'r_sup_flow'},{l:'Tamper / valve',n:'r_sup_tamper'},{l:'Not sure',n:'r_sup_flow'}]},r_eol_missing:{type:'res',title:'EOL Resistor Missing',body:'No end-of-line resistor is installed — zone cannot verify circuit continuity.\n\n1. Identify correct EOL resistance from panel documentation\n2. Install EOL resistor at last device on zone\n3. Verify fault clears\n\nDocument the missing EOL in the service record — this is a code deficiency.',parts:['EOL resistor (correct ohm value per panel specs)'],sev:'low'},r_wire_break:{type:'res',title:'Wire Break in Zone Circuit',body:'A conductor is broken in the zone wiring. Walk the circuit from panel to EOL, inspecting:\n• Every device base for loose wires\n• Every junction box and pull box\n• Any conduit entry where wire could be pinched\n\nRepair by re-splicing or pulling new wire.',parts:['Wire (matching gauge)','Wire nuts or Wago connectors'],sev:'med'},r_panel_input:{type:'res',title:'Panel Zone Input May Have Failed',body:'Field wiring checks correct but panel still shows zone trouble. Zone input circuit on panel may have failed.\n\n1. Try cross-wiring this zone to a spare zone input on the panel\n2. Reprogram to recognize the new zone input\n3. Escalate if no spare zone inputs are available',parts:['Panel zone input module (if modular)'],sev:'high'},r_panel_terminal:{type:'res',title:'Loose Terminal at Panel',body:'Zone resistance is correct at field wiring but not making good contact at panel terminal.\n\n1. Re-terminate zone conductors at panel zone input terminals\n2. Use correct torque for terminal type\n3. Clear fault and verify zone reads correct resistance',parts:[],sev:'low'},r_wiring_short:{type:'res',title:'Short in Zone Field Wiring',body:'Short persists even with all devices disconnected — the short is in the wiring itself.\n\n1. Disconnect wiring at midpoints to isolate shorted segment\n2. Inspect all junction boxes and conduit entries\n3. Look for conductors touching, insulation damaged by staple, or water bridging\n4. Repair or replace damaged wiring',parts:['Wire','Junction box connectors'],sev:'med'},r_device_shorted:{type:'res',title:'Shorted Device Found',body:'A device on the zone has failed with an internal short.\n\n1. Identify the specific device by reconnecting one at a time until short returns\n2. Replace the failed device with a matching model\n3. Verify zone resistance returns to correct EOL value after replacement',parts:['Replacement initiating device (correct model)'],sev:'med'},r_moisture_low:{type:'res',title:'Moisture Causing Low Resistance',body:'Moisture bridging across wire insulation is lowering the effective zone resistance.\n\n1. Inspect all junction boxes on this zone for standing water or condensation\n2. Dry out affected boxes and inspect insulation for damage\n3. Replace wire with damaged insulation\n4. Add weatherproof covers to exterior junction boxes',parts:['Wire','Weatherproof junction box covers'],sev:'med'},r_partial_short:{type:'res',title:'Partial Short in Wiring',body:'Slightly low resistance without obvious cause may be a partial short — insulation is compromised but not fully shorted.\n\n1. Disconnect zone wiring in half-segments and measure each segment\n2. The segment reading low is the fault location\n3. Inspect wiring in that segment for damaged insulation\n4. Repair or replace affected wiring',parts:['Wire'],sev:'med'},r_eol_wrong:{type:'res',title:'Wrong EOL Resistor Value',body:'The installed EOL resistor value does not match what the panel expects.\n\n1. Check panel documentation for correct EOL resistance value for this zone type\n2. Replace the EOL resistor with the correct value\n3. Verify zone reads correctly after correction\n\nCommon values: 2.2kΩ, 3.9kΩ, 4.7kΩ, 5.6kΩ, 10kΩ',parts:['Correct EOL resistor'],sev:'low'},r_sup_flow:{type:'res',title:'Waterflow Zone Trouble',body:'For waterflow supervisory zone trouble, use the Supervisory Input diagnostic tree for a complete waterflow investigation.',parts:[],sev:'low'},r_sup_tamper:{type:'res',title:'Tamper/Valve Zone Trouble',body:'For tamper or valve supervisory zone trouble, use the Supervisory Input diagnostic tree for a complete tamper/valve investigation.',parts:[],sev:'low'}}},
signal_queue:{title:'Post-Test Queue Drain',ico:'📶',desc:'DACT signal queue after testing — prevent unwanted dispatch',isNew:true,start:'q1',nodes:{q1:{q:'What type of communicator is installed on this panel?',type:'ch',opts:[{l:'Starlink (IP via satellite router)',n:'q_sl'},{l:'Cellular DACT (4G/LTE)',n:'q_cell'},{l:'Dual-path (Starlink + cellular)',n:'q_dual'},{l:'POTS / traditional phone line',n:'q_pots'}]},q_sl:{q:'Did you just complete a walk test, functional test, or were signals being generated during this service call?',type:'yn',y:'q_sl2',n:'q_sl_other'},q_sl2:{q:'IMPORTANT: Is the panel currently showing NORMAL (no active alarms or troubles), but monitoring is still receiving signals?',type:'yn',y:'q_sl3',n:'q_sl_active'},q_sl3:{q:'This is the Starlink queue drain scenario. How long ago did you finish testing?',type:'ch',opts:[{l:'Less than 10 minutes ago',n:'r_sl_draining'},{l:'10–30 minutes ago',n:'r_sl_draining'},{l:'More than 30 minutes ago',n:'r_sl_late'}]},q_sl_active:{q:'Panel still has active alarms or troubles. Resolve all active conditions first. Are you able to clear all active events now?',type:'yn',y:'r_sl_clear_first',n:'r_sl_escalate'},q_sl_other:{q:'No recent testing, but monitoring is receiving signals. Check the DACT transmission log on the panel. Are signals going out continuously or intermittently?',type:'ch',opts:[{l:'Continuous signal transmissions',n:'r_sl_continuous'},{l:'Occasional bursts',n:'r_sl_intermittent'},{l:'Cannot access log',n:'r_sl_check_panel'}]},q_cell:{q:'Did you just complete a walk test or generate test signals during this visit?',type:'yn',y:'q_cell2',n:'q_cell_other'},q_cell2:{q:'Have you notified the monitoring company that testing is complete and to expect residual signals?',type:'yn',y:'r_cell_notified',n:'r_cell_notify_now'},q_cell_other:{q:'No recent testing. Check cellular communicator status LED. Is it showing normal connectivity?',type:'yn',y:'r_cell_spurious',n:'r_cell_no_signal'},q_dual:{q:'Did you just complete testing?',type:'yn',y:'r_dual_post_test',n:'r_dual_monitor'},q_pots:{q:'POTS communicators transmit signals in near-real-time — signal queuing is rare. Are signals being received by monitoring after a test?',type:'yn',y:'r_pots_test',n:'r_pots_other'},r_sl_draining:{type:'res',title:'Starlink Queue Draining — Act Now',body:'The Starlink communicator queued signals generated during testing and is now transmitting them. This is a known behavior with IP/satellite communicators.\n\nIMMEDIATELY:\n1. Call monitoring company — give name, location, and account number\n2. Tell them: "Signals coming in are residual test signals from testing completed at [time]. Please hold all dispatches."\n3. Get a confirmation number from the monitoring operator\n4. Stay on standby until monitoring confirms queue is clear\n\nTypically clears within 5–20 minutes depending on signal volume.',parts:[],sev:'high'},r_sl_late:{type:'res',title:'Late Queue Drain — Verify with Monitoring',body:'More than 30 minutes after testing, the queue should be mostly clear. However, large signal volumes can drain slowly.\n\n1. Call monitoring company immediately if you have not already\n2. Ask them to review signal timestamps — test signals should pre-date when you finished\n3. If signals are still arriving, stay on with monitoring until queue clears\n4. Document: test end time, time signals stopped transmitting\n\nFor future visits: notify monitoring BEFORE testing begins.',parts:[],sev:'med'},r_sl_clear_first:{type:'res',title:'Clear Active Events First',body:'Panel must return to fully normal before you can assess whether remaining signals are residual queue drain.\n\n1. Resolve all active alarms and troubles on the panel\n2. Silence and reset the panel to normal state\n3. Once panel is NORMAL, contact monitoring company\n4. Monitor communicator transmission log for 10–15 minutes\n5. If signals continue after panel is fully normal, it is queue drain — follow post-test queue protocol',parts:[],sev:'med'},r_sl_escalate:{type:'res',title:'Cannot Clear Panel — Escalate',body:'Do not leave the site with the communicator actively transmitting and panel unable to be cleared.\n\n1. Contact monitoring company and advise system is in an active trouble/alarm state\n2. Coordinate with monitoring on whether to place system on test mode or bypass\n3. Escalate to senior tech\n4. Document all active conditions and steps taken',parts:[],sev:'high'},r_sl_continuous:{type:'res',title:'Continuous Transmissions — Investigate',body:'Continuous signal transmissions without active testing suggest a fault in the communicator or a recurring panel event.\n\n1. Check panel event log — is there an active alarm or trouble that keeps generating?\n2. Check Starlink communicator status display for error codes\n3. Verify Starlink router is connected to the internet\n4. If panel is normal and Starlink is connected but still sending — communicator may need a power cycle',parts:[],sev:'high'},r_sl_intermittent:{type:'res',title:'Intermittent Bursts — Monitor',body:'Intermittent signal bursts from a Starlink communicator can indicate:\n• Queued signals from earlier events still draining\n• Intermittent connectivity causing retransmissions\n• A recurring intermittent panel condition\n\n1. Check panel event log for recent recurring events\n2. Check Starlink connectivity status\n3. Monitor for 15 minutes — if bursts stop, it was queue drain\n4. If bursts continue, dig deeper into panel event log',parts:[],sev:'med'},r_sl_check_panel:{type:'res',title:'Access the DACT Transmission Log',body:'The DACT transmission log is essential for diagnosing signal queue issues. How to access on common panels:\n\n• Notifier NFS2-640: HISTORY → DACT LOG\n• Silent Knight: DIAGNOSTICS → COMM LOG\n• EST3: MENU → HISTORY → TRANSMISSION LOG\n• Simplex 4100ES: MAIN MENU → HISTORY → COMM\n\nLook for signal timestamps, types, and whether they match your testing activity.',parts:[],sev:'med'},r_cell_notified:{type:'res',title:'Monitoring Notified — Monitor Queue',body:'Good — monitoring company is aware. Cellular communicators typically have shorter queue drain times than Starlink.\n\n1. Allow 5–10 minutes for the queue to drain\n2. Stay in contact with monitoring until they confirm no more test signals\n3. Get a confirmation number and document in job notes\n4. Before leaving site, confirm monitoring shows panel as NORMAL',parts:[],sev:'low'},r_cell_notify_now:{type:'res',title:'Notify Monitoring Company Now',body:'You must notify the monitoring company immediately.\n\n1. Call monitoring company NOW — do not wait\n2. Provide: technician name, site name, account number, time testing completed\n3. Request they hold all dispatches for test-related signal types\n4. Get a confirmation number\n5. Stay on standby until monitoring confirms queue clear\n\nThis is time-critical — every minute increases risk of a false dispatch.',parts:[],sev:'high'},r_cell_spurious:{type:'res',title:'Cellular — Possible Spurious Signals',body:'Cellular communicator is connected but sending signals with no recent testing. Possible causes:\n• A panel event that is cycling (intermittent alarm/restore)\n• A cellular firmware issue causing false transmissions\n• An actual system condition generating signals\n\n1. Review panel event log for last 24 hours\n2. Power cycle the cellular communicator (confirm with monitoring first)\n3. If signals continue after power cycle, escalate — communicator may need replacement',parts:['Replacement cellular communicator (if needed)'],sev:'med'},r_cell_no_signal:{type:'res',title:'Cellular — No Connectivity',body:'Cellular communicator is not showing normal connectivity — this is a monitoring impairment.\n\n1. Check cellular antenna connection — common failure point\n2. Verify SIM card is seated and active\n3. Check account status with monitoring company — SIM may have lapsed\n4. Move the communicator antenna to better signal position if possible\n5. Document impairment and notify monitoring company',parts:['Cellular antenna replacement if damaged'],sev:'high'},r_dual_post_test:{type:'res',title:'Dual-Path — Post-Test Protocol',body:'Dual-path communicators (Starlink + cellular) can queue signals on BOTH paths and transmit on whichever connects first — then retransmit on the backup path, potentially doubling signal volume.\n\n1. Notify monitoring company that testing is complete on a dual-path system\n2. Advise them to expect duplicate signals on both paths\n3. Ask monitoring to suppress duplicates for the next 30 minutes\n4. Document the session in job notes with signal count if accessible',parts:[],sev:'med'},r_dual_monitor:{type:'res',title:'Dual-Path — Check Both Paths',body:'No recent testing, but signals arriving. On a dual-path system:\n\n1. Check primary path (Starlink) connectivity status\n2. Check secondary path (cellular) connectivity status\n3. A path failure can cause the communicator to resend buffered signals on restoration\n4. Review communicator event log for path failure events\n5. If one path is down, treat as single-path impairment — escalate',parts:[],sev:'med'},r_pots_test:{type:'res',title:'POTS — Test Signals Sent in Real-Time',body:'POTS communicators transmit signals as they happen — there is no queue drain. If monitoring received test signals:\n\n1. Confirm monitoring company has your test complete notification\n2. Verify monitoring has cleared the test mode and is monitoring normally\n3. If you did not notify monitoring before testing, do so now and confirm no dispatch was sent\n\nFor future visits: always notify monitoring BEFORE beginning any testing on a POTS communicator.',parts:[],sev:'low'},r_pots_other:{type:'res',title:'POTS — Unexpected Signals',body:'POTS communicator transmitting unexpected signals (no recent testing) likely means:\n• An active panel condition is generating real signals\n• The phone line is causing noise/false signals (common with VoIP lines)\n• The communicator is malfunctioning\n\n1. Check panel for any active conditions first\n2. Verify the phone line is a dedicated analog POTS line — NOT VoIP\n3. VoIP lines cause DACT failures — if detected, recommend upgrade to IP or cellular communicator',parts:['IP or cellular communicator (if VoIP line detected)'],sev:'med'}}}
};

function rCalc(){
  const tab=S.calcTab;
  let calcHTML='';
  if(tab==='nac'){
    const g=S.calcNAC.gauge,len=parseFloat(S.calcNAC.length)||0,dev=parseFloat(S.calcNAC.devices)||0,avg=parseFloat(S.calcNAC.avgCurrent)||0;
    const res=(WIRE_RES[g]||6.385)/1000;
    const totalCurrent=(dev*avg)/1000;
    const vDrop=totalCurrent*(res*len*2);
    const vEnd=24-vDrop;
    const limit=1.5;
    const ok=totalCurrent<=limit&&vEnd>=21;
    const warn=totalCurrent<=limit&&vEnd>=21&&vEnd<22.5;
    const cls=!ok?'calc-result-fail':warn?'calc-result-warn':'calc-result-ok';
    const vcls=!ok?'calc-result-val-fail':warn?'calc-result-val-warn':'calc-result-val-ok';
    const lcls=!ok?'calc-result-label-fail':warn?'calc-result-label-warn':'calc-result-label-ok';
    calcHTML=`
<div class="calc-field"><label class="calc-label">Wire Gauge</label><select class="calc-select" onchange="updateCalc('nac','gauge',this.value)">${Object.entries(WIRE_NAMES).map(([k,v])=>`<option value="${k}" ${S.calcNAC.gauge===k?'selected':''}>${v}</option>`).join('')}</select></div>
<div class="calc-field"><label class="calc-label">One-Way Run Length (ft)</label><input class="calc-input" type="number" value="${S.calcNAC.length}" oninput="updateCalc('nac','length',this.value)" placeholder="200" /></div>
<div class="calc-field"><label class="calc-label">Number of Devices</label><input class="calc-input" type="number" value="${S.calcNAC.devices}" oninput="updateCalc('nac','devices',this.value)" placeholder="12" /></div>
<div class="calc-field"><label class="calc-label">Avg Current per Device (mA)</label><input class="calc-input" type="number" value="${S.calcNAC.avgCurrent}" oninput="updateCalc('nac','avgCurrent',this.value)" placeholder="80" /></div>
<div class="calc-result ${cls}">
  <div class="calc-result-val ${vcls}">${totalCurrent.toFixed(2)} A</div>
  <div class="calc-result-label ${lcls}">${!ok?(totalCurrent>limit?'Over Circuit Limit':'Low Voltage at End'):warn?'Marginal — Check Closely':'Within Limits ✓'}</div>
  <div class="calc-result-rows">
    <div class="calc-result-row"><span class="calc-result-row-label">Total current draw</span><span class="calc-result-row-val">${totalCurrent.toFixed(3)} A</span></div>
    <div class="calc-result-row"><span class="calc-result-row-label">Circuit limit (typical)</span><span class="calc-result-row-val">1.5 A</span></div>
    <div class="calc-result-row"><span class="calc-result-row-label">Voltage drop</span><span class="calc-result-row-val">${vDrop.toFixed(2)} V</span></div>
    <div class="calc-result-row"><span class="calc-result-row-label">Voltage at end of run</span><span class="calc-result-row-val ${vEnd<21?'calc-result-val-fail':''}"><b>${vEnd.toFixed(1)} V</b></span></div>
  </div>
  <div class="calc-result-note">${!ok&&totalCurrent>limit?'Current draw exceeds 1.5A circuit limit. Consider splitting the circuit or using heavier gauge wire.':!ok&&vEnd<21?'Voltage too low at end of run. Use heavier gauge wire or shorten the run.':warn?'Voltage is marginal at end of run. Verify device minimum operating voltage.':'NAC circuit is within typical operating limits. Verify against your specific panel specifications.'}</div>
</div>`;
  } else if(tab==='battery'){
    const stand=parseFloat(S.calcBatt.standby)||0,alm=parseFloat(S.calcBatt.alarm)||0,almMin=parseFloat(S.calcBatt.alarmMin)||5,batt=parseFloat(S.calcBatt.battAH)||0;
    const required=((stand/1000)*24+(alm/1000)*(almMin/60))*1.2;
    const margin=batt-required;
    const ok=batt>=required;
    const cls=ok?'calc-result-ok':'calc-result-fail';
    const vcls=ok?'calc-result-val-ok':'calc-result-val-fail';
    const lcls=ok?'calc-result-label-ok':'calc-result-label-fail';
    calcHTML=`
<div class="calc-field"><label class="calc-label">Panel Standby Current (mA)</label><input class="calc-input" type="number" value="${S.calcBatt.standby}" oninput="updateCalc('battery','standby',this.value)" placeholder="350" /></div>
<div class="calc-field"><label class="calc-label">Full Alarm Current (mA)</label><input class="calc-input" type="number" value="${S.calcBatt.alarm}" oninput="updateCalc('battery','alarm',this.value)" placeholder="3000" /></div>
<div class="calc-field"><label class="calc-label">Alarm Duration Required (min)</label><input class="calc-input" type="number" value="${S.calcBatt.alarmMin}" oninput="updateCalc('battery','alarmMin',this.value)" placeholder="5" /></div>
<div class="calc-field"><label class="calc-label">Installed Battery Rating (AH)</label><input class="calc-input" type="number" value="${S.calcBatt.battAH}" oninput="updateCalc('battery','battAH',this.value)" placeholder="18" /></div>
<div class="calc-result ${cls}">
  <div class="calc-result-val ${vcls}">${required.toFixed(1)} AH</div>
  <div class="calc-result-label ${lcls}">Required per NFPA 72 (24hr standby + ${almMin} min alarm + 20% margin)</div>
  <div class="calc-result-rows">
    <div class="calc-result-row"><span class="calc-result-row-label">Required battery AH</span><span class="calc-result-row-val">${required.toFixed(2)} AH</span></div>
    <div class="calc-result-row"><span class="calc-result-row-label">Installed battery AH</span><span class="calc-result-row-val">${batt} AH</span></div>
    <div class="calc-result-row"><span class="calc-result-row-label">Margin</span><span class="calc-result-row-val ${margin<0?'calc-result-val-fail':''}">${margin>=0?'+':''}${margin.toFixed(2)} AH</span></div>
    <div class="calc-result-row"><span class="calc-result-row-label">NFPA 72 compliant</span><span class="calc-result-row-val">${ok?'✓ Yes':'✗ No'}</span></div>
  </div>
  <div class="calc-result-note">${ok?`Battery is sufficient. Margin of ${margin.toFixed(2)} AH above required.`:`Battery is UNDERSIZED. Need ${(required-batt).toFixed(2)} more AH. Replace with larger battery. Common sizes: 7, 12, 18, 26, 33 AH.`}</div>
</div>`;
  } else if(tab==='voltdrop'){
    const g=S.calcVolt.gauge,len=parseFloat(S.calcVolt.length)||0,cur=parseFloat(S.calcVolt.current)||0;
    const res=(WIRE_RES[g]||6.385)/1000;
    const curA=cur/1000;
    const vDrop=curA*(res*len*2);
    const vEnd=24-vDrop;
    const ok=vEnd>=21;
    const warn=vEnd>=21&&vEnd<22;
    const cls=!ok?'calc-result-fail':warn?'calc-result-warn':'calc-result-ok';
    const vcls=!ok?'calc-result-val-fail':warn?'calc-result-val-warn':'calc-result-val-ok';
    calcHTML=`
<div class="calc-field"><label class="calc-label">Wire Gauge</label><select class="calc-select" onchange="updateCalc('volt','gauge',this.value)">${Object.entries(WIRE_NAMES).map(([k,v])=>`<option value="${k}" ${S.calcVolt.gauge===k?'selected':''}>${v}</option>`).join('')}</select></div>
<div class="calc-field"><label class="calc-label">One-Way Run Length (ft)</label><input class="calc-input" type="number" value="${S.calcVolt.length}" oninput="updateCalc('volt','length',this.value)" placeholder="300" /></div>
<div class="calc-field"><label class="calc-label">Current Draw (mA)</label><input class="calc-input" type="number" value="${S.calcVolt.current}" oninput="updateCalc('volt','current',this.value)" placeholder="1000" /></div>
<div class="calc-result ${cls}">
  <div class="calc-result-val ${vcls}">${vEnd.toFixed(1)} V</div>
  <div class="calc-result-label ${vcls}">Voltage at end of run</div>
  <div class="calc-result-rows">
    <div class="calc-result-row"><span class="calc-result-row-label">Wire resistance (round trip)</span><span class="calc-result-row-val">${(res*len*2).toFixed(2)} Ω</span></div>
    <div class="calc-result-row"><span class="calc-result-row-label">Voltage drop</span><span class="calc-result-row-val">${vDrop.toFixed(2)} V</span></div>
    <div class="calc-result-row"><span class="calc-result-row-label">Voltage at end of run</span><span class="calc-result-row-val">${vEnd.toFixed(1)} V</span></div>
    <div class="calc-result-row"><span class="calc-result-row-label">Minimum device voltage (typical)</span><span class="calc-result-row-val">21.0 V</span></div>
  </div>
  <div class="calc-result-note">${!ok?'Voltage is too low at the end of the run. Use a heavier gauge wire or shorten the run. Most devices require at least 21V DC minimum.':warn?'Voltage is marginal. Check the minimum operating voltage for your specific devices.':'Voltage is adequate at end of run.'}</div>
</div>`;
  } else if(tab==='eol'){
    const EOL_VALS={
      'Notifier — Onboard NAC (NFS-320, NFS2-640)':{expected:2200,range:[1800,2600],unit:'Ω'},
      'Notifier — FCM-1 / XP6-C Module NAC':{expected:47000,range:[42000,52000],unit:'Ω'},
      'Silent Knight — NAC (SK-5208, SK-5820XL)':{expected:4700,range:[4200,5200],unit:'Ω'},
      'Silent Knight — IDC Zone (SK-5208)':{expected:4700,range:[4200,5200],unit:'Ω'},
      'EST / Edwards — NAC (iO64, iO500)':{expected:15000,range:[13000,17000],unit:'Ω'},
      'Simplex — NAC (4100ES, 4010ES)':{expected:10000,range:[9000,11000],unit:'Ω'},
      'Fire-Lite — NAC (MS-9200, MS-9600)':{expected:4700,range:[4200,5200],unit:'Ω'},
      'Fire-Lite — MMF-300 / MDF-300 Module IDC':{expected:47000,range:[42000,52000],unit:'Ω'},
      'Fire-Lite — MMF-302 Module IDC':{expected:3900,range:[3400,4400],unit:'Ω'},
      'Bosch — Zone / NAC (D7412, D9412, FPD-7024)':{expected:1000,range:[800,1200],unit:'Ω'},
    };
    const sel=S.calcEOL.brand;
    const reading=parseFloat(S.calcEOL.reading);
    const spec=EOL_VALS[sel];
    let resultCard='';
    if(spec&&!isNaN(reading)&&reading>0){
      const exp=spec.expected;
      const isShort=reading<100;
      const isOpen=reading>exp*10;
      const isOk=reading>=spec.range[0]&&reading<=spec.range[1];
      const cls=isShort||isOpen?'calc-result-fail':isOk?'calc-result-ok':'calc-result-warn';
      const vcls=isShort||isOpen?'calc-result-val-fail':isOk?'calc-result-val-ok':'calc-result-val-warn';
      const status=isShort?'SHORT CIRCUIT':isOpen?'OPEN CIRCUIT':isOk?'NORMAL ✓':'WRONG VALUE';
      const note=isShort?'Reading indicates a short circuit on this circuit. Do not confuse with a low-value EOL.':isOpen?'Reading indicates an open circuit — EOL resistor may be missing, wiring is broken, or last device is disconnected.':isOk?`Reading is within normal range for this circuit type. Expected: ${(exp/1000).toFixed(1)}kΩ, Normal range: ${(spec.range[0]/1000).toFixed(1)}–${(spec.range[1]/1000).toFixed(1)}kΩ.`:`Reading is outside normal range. Expected ${(exp/1000).toFixed(1)}kΩ. Wrong EOL installed, or circuit fault causing reading to be ${reading<exp?'low (possible partial short or wrong resistor)':'high (possible high-resistance joint or wrong resistor)'}.`;
      resultCard=`<div class="calc-result ${cls}"><div class="calc-result-val ${vcls}" style="font-size:24px">${status}</div><div class="calc-result-rows"><div class="calc-result-row"><span class="calc-result-row-label">Your reading</span><span class="calc-result-row-val">${reading>=1000?(reading/1000).toFixed(2)+'kΩ':reading+'Ω'}</span></div><div class="calc-result-row"><span class="calc-result-row-label">Expected value</span><span class="calc-result-row-val">${(exp/1000).toFixed(1)}kΩ</span></div><div class="calc-result-row"><span class="calc-result-row-label">Normal range</span><span class="calc-result-row-val">${(spec.range[0]/1000).toFixed(1)}–${(spec.range[1]/1000).toFixed(1)}kΩ</span></div></div><div class="calc-result-note">${note}</div></div>`;
    } else if(spec){resultCard=`<div class="calc-info"><div class="calc-info-txt">Expected EOL value for this circuit: <strong style="color:var(--t1)">${(spec.expected/1000).toFixed(1)} kΩ</strong><br/>Normal multimeter range: ${(spec.range[0]/1000).toFixed(1)}–${(spec.range[1]/1000).toFixed(1)} kΩ<br/>Reading below ~100Ω = short circuit. Reading above ${(spec.expected/100).toFixed(0)}kΩ = open circuit.</div></div>`;}
    calcHTML=`
<div class="calc-field"><label class="calc-label">Panel / Circuit Type</label><select class="calc-select" onchange="updateCalcEOL('brand',this.value)">${Object.keys(EOL_VALS).map(k=>`<option value="${k}" ${S.calcEOL.brand===k?'selected':''}>${k}</option>`).join('')}</select></div>
<div class="calc-field"><label class="calc-label">Multimeter Reading (Ω)</label><input class="calc-input" type="number" value="${S.calcEOL.reading}" oninput="updateCalcEOL('reading',this.value)" placeholder="e.g. 2200" /></div>
${resultCard}`;
  }
  return `<div>
<button class="back-btn" onclick="setTool(null)">‹ Tools</button>
<div class="pg-head" style="padding-top:4px"><div class="pg-title">Electrical Calc</div><div class="pg-sub">Field calculations for FA circuits</div></div>
<div class="calc-tabs-row">
  <button class="calc-tab ${tab==='nac'?'on':''}" onclick="setCalcTab('nac')">NAC Load</button>
  <button class="calc-tab ${tab==='battery'?'on':''}" onclick="setCalcTab('battery')">Battery</button>
  <button class="calc-tab ${tab==='voltdrop'?'on':''}" onclick="setCalcTab('voltdrop')">Volt Drop</button>
  <button class="calc-tab ${tab==='eol'?'on':''}" onclick="setCalcTab('eol')">EOL Check</button>
</div>
<div class="calc-body">${calcHTML}</div>
<div class="sp"></div></div>`;}

let timerInterval=null;
function rTimer(){
  const t=S.timer;
  const elapsed=t.active?(Date.now()-t.start):t.elapsed;
  const hrs=Math.floor(elapsed/3600000);
  const mins=Math.floor((elapsed%3600000)/60000);
  const secs=Math.floor((elapsed%60000)/1000);
  const fmt=`${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  const totalHrs=elapsed/3600000;
  const colorClass=totalHrs>=8?'timer-active-red':totalHrs>=4?'timer-active-amber':'timer-active-green';
  const elClass=totalHrs>=8?'timer-elapsed-red':totalHrs>=4?'timer-elapsed-amber':'timer-elapsed-green';
  const typeLabels={test:'Walk Test / System Test',bypass:'Zone or System Bypass',repair:'Repair in Progress'};
  const types=[{k:'test',l:'Test Mode'},{k:'bypass',l:'Bypass'},{k:'repair',l:'Repair'}];
  if(t.active){
    let alerts='';
    if(totalHrs>=8){alerts+=`<div class="timer-alert timer-alert-red"><div class="timer-alert-txt timer-alert-txt-red">⚠ 8+ hours — AHJ notification may be required. Verify local requirements immediately.</div></div>`;}
    else if(totalHrs>=4){alerts+=`<div class="timer-alert timer-alert-amber"><div class="timer-alert-txt timer-alert-txt-amber">⏱ 4+ hours — approaching AHJ notification threshold. Document impairment start time in job notes.</div></div>`;}
    return `<div>
<button class="back-btn" onclick="setTool(null)">‹ Tools</button>
<div class="pg-head" style="padding-top:4px"><div class="pg-title">Impairment Timer</div><div class="pg-sub">${t.site||'Active Impairment'}</div></div>
<div class="timer-body">
  ${alerts}
  <div class="timer-active ${colorClass}">
    <div class="timer-elapsed ${elClass}">${fmt}</div>
    <div class="timer-site-label">${t.site||'Unnamed Site'}</div>
    <div class="timer-type-label">${typeLabels[t.type]||t.type}</div>
  </div>
  <button class="timer-stop" onclick="stopTimer()">Stop Timer &amp; Log to Notes</button>
</div>
<div class="sp"></div></div>`;
  }
  return `<div>
<button class="back-btn" onclick="setTool(null)">‹ Tools</button>
<div class="pg-head" style="padding-top:4px"><div class="pg-title">Impairment Timer</div><div class="pg-sub">Track system impairment duration</div></div>
<div class="timer-body">
  <label class="fl">Site Name</label>
  <input class="timer-site-input" type="text" placeholder="e.g. Acme Warehouse — Woburn" id="timer-site" value="${t.site}" oninput="S.timer.site=this.value" />
  <label class="fl">Impairment Type</label>
  <div class="timer-type-row">${types.map(ty=>`<button class="timer-type-btn ${t.type===ty.k?'sel':''}" onclick="setTimerType('${ty.k}')">${ty.l}</button>`).join('')}</div>
  <button class="timer-start" onclick="startTimer()">Start Timer</button>
  <div class="calc-info" style="margin-top:14px"><div class="calc-info-txt">Timer alerts you at 4 hours (amber) and 8 hours (red).<br/>When stopped, duration is automatically logged to your current job notes session.</div></div>
</div>
<div class="sp"></div></div>`;}

function rDiagnose(){
  if(S.dtree&&S.dcur)return rFlow();
  return `<div>
<div class="dg-head"><div class="pg-title">Diagnose</div><div class="pg-sub">Select a fault type to begin</div></div>
<div class="tree-grid">${Object.entries(TR).map(([k,t])=>`<div class="tc" onclick="sDT('${k}')">${t.isNew?`<div class="tc-new">NEW</div>`:''} <div class="tc-ico">${t.ico}</div><div class="tc-title">${t.title}</div><div class="tc-desc">${t.desc}</div></div>`).join('')}</div>
<div class="sp"></div></div>`;}

function rFlow(){
  const tree=TR[S.dtree];const node=tree.nodes[S.dcur];if(!node)return rDiagnose();
  const depth=S.dhist.length;const progress=Math.min(depth/9,1);
  const nav=`<div class="flow-nav"><button class="flow-back" onclick="exitTree()">‹ ${tree.title}</button><span class="flow-step-pill">${node.type==='res'?'Result':`Step ${depth+1}`}</span></div><div class="progress"><div class="progress-fill" style="width:${Math.round(progress*100)}%"></div></div><div class="crumbs"><span class="crumb link" onclick="exitTree()">${tree.ico} ${tree.title}</span>${S.dhist.map((_,i)=>`<span class="crumb-sep">›</span><span class="crumb">${i+1}</span>`).join('')}${node.type!=='res'?`<span class="crumb-sep">›</span><span class="crumb active">${depth+1}</span>`:''}</div>`;
  if(node.type==='res'){const sc=resClass(node.sev),rt=resTop(node.sev);return `<div>${nav}<div class="result-banner ${sc}"><div class="result-banner-top ${rt}"></div><div class="result-banner-body"><div class="res-icon-row"><span class="res-ico">${sevIco(node.sev)}</span><div><div class="res-title">${node.title}</div><div class="res-sev-label" style="color:${sevColor(node.sev)}">${sevLabel(node.sev)}</div></div></div><div class="res-body">${node.body}</div>${node.parts&&node.parts.length?`<div class="parts-head">Parts / Tools Needed</div><div class="parts-wrap">${node.parts.map(p=>`<div class="part-tag">${p}</div>`).join('')}</div>`:''}</div></div><div class="res-restart"><button onclick="exitTree()">← Back to Trees</button></div><div class="sp"></div></div>`;}
  if(node.type==='yn')return `<div>${nav}<div class="q-card"><div class="q-accent"></div><div class="q-body"><div class="q-label">Step ${depth+1}</div><div class="q-text">${node.q}</div></div></div><div class="yn-row"><button class="yn-btn yn-y" onclick="adv('${node.y}')">✓ Yes</button><button class="yn-btn yn-n" onclick="adv('${node.n}')">✗ No</button></div><div class="esc-btns">${depth>0?`<button class="go-back" onclick="goBack()">← Go Back</button>`:''} <button class="esc-btn" onclick="exitTree()">Escalate / Exit</button></div><div class="sp"></div></div>`;
  if(node.type==='ch')return `<div>${nav}<div class="q-card"><div class="q-accent"></div><div class="q-body"><div class="q-label">Step ${depth+1}</div><div class="q-text">${node.q}</div></div></div>${node.opts.map((o,i)=>`<div class="opt" onclick="adv('${o.n}')"><div class="opt-num">${String.fromCharCode(65+i)}</div><div class="opt-text">${o.l}</div><div class="opt-chev">›</div></div>`).join('')}<div class="esc-btns">${depth>0?`<button class="go-back" onclick="goBack()">← Go Back</button>`:''} <button class="esc-btn" onclick="exitTree()">Escalate / Exit</button></div><div class="sp"></div></div>`;
  if(node.type==='info')return `<div>${nav}<div class="q-card"><div class="q-accent"></div><div class="q-body"><div class="q-label">Note</div><div class="q-text">${node.q}</div></div></div><div style="padding:0 16px"><button style="width:100%;padding:13px;background:var(--a);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit" onclick="adv('${node.next}')">Continue →</button></div><div class="sp"></div></div>`;
  return rDiagnose();}

<div class="notes-list">${S.notes.length===0?`<div class="empty"><div class="empty-ico">✎</div><div class="empty-t">No sessions yet</div><div class="empty-s">Tap + to start a new session</div></div>`:S.notes.map((n,i)=>`<div class="note-c" onclick="openN(${i})"><div class="note-top"><div class="note-site">${n.site}</div><div class="note-date">${n.date}</div></div><div class="note-job">Job: ${n.job||'—'}</div><div class="note-preview">${n.entries[n.entries.length-1]?.text?.substring(0,80)||''}${(n.entries[n.entries.length-1]?.text?.length||0)>80?'...':''}</div><div>${[...new Set(n.entries.map(e=>e.tag))].map(tag=>`<span class="ntag ntag-${tag[0]}">${tag}</span>`).join('')}</div></div>`).join('')}</div>

function rNoteDetail(){const n=S.notes[S.noteIdx];const tagMap={finding:'f',action:'a',parts:'p',callback:'c'};return `<div><button class="back-btn" onclick="closeN()">‹ All Sessions</button><div class="pg-head" style="padding-top:4px"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px"><div><div class="pg-title" style="font-size:20px">${n.site}</div><div class="pg-sub">Job: ${n.job||'—'} · ${n.date}</div></div><button class="delete-btn" onclick="deleteSession(${S.noteIdx})">Delete</button></div></div><div style="padding:0 16px">${n.entries.map(e=>`<div class="entry-row entry-${tagMap[e.tag]||'f'}"><div class="entry-meta"><span class="entry-time">${e.time}</span><span class="ntag ntag-${tagMap[e.tag]||'f'}">${e.tag}</span></div><div class="entry-text">${e.text}</div></div>`).join('')}${n.entries.length===0?`<div class="empty"><div class="empty-ico">✎</div><div class="empty-t">No entries yet</div></div>`:''}</div>${S.addEntry?rAddEntry():`<div class="fab-wrap" style="margin-top:4px"><button class="fab" onclick="togE()">+</button></div>`}<div class="sp"></div></div>`;}
