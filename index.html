let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  if(!localStorage.getItem(DISMISSED_KEY)){
    document.getElementById('install-banner').classList.add('show');
  }
});
document.getElementById('install-btn').addEventListener('click',()=>{
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').classList.remove('show');});}
});
document.getElementById('install-close').addEventListener('click',()=>{
  localStorage.setItem(DISMISSED_KEY,'1');
  document.getElementById('install-banner').classList.remove('show');
});

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}

function sev2cls(s){return s==='TROUBLE'?'rsev-t':s==='SUPERVISORY'?'rsev-s':'rsev-c';}
function sev2badge(s){return s==='TROUBLE'?'rbadge-t':s==='SUPERVISORY'?'rbadge-s':'rbadge-c';}
function sevColor(s){return {high:'#EF4444',med:'#F59E0B',low:'#22C55E'}[s]||'#F59E0B';}
function sevLabel(s){return {high:'Escalate / Critical',med:'Moderate Fix',low:'Simple Fix'}[s]||'';}
function sevIco(s){return {high:'🔴',med:'🟡',low:'🟢'}[s]||'🟡';}
function resClass(s){return {high:'result-banner-high',med:'result-banner-med',low:'result-banner-low'}[s]||'result-banner-med';}
function resTop(s){return {high:'rb-top-h',med:'rb-top-m',low:'rb-top-l'}[s]||'rb-top-m';}

function R(){
  const tabs=[
    {id:'home',l:'Home',i:'⊞'},
    {id:'search',l:'Codes',i:'⌕'},
    {id:'diagnose',l:'Diagnose',i:'⑂'},
    {id:'panels',l:'Panels',i:'◫'},
    {id:'cid',l:'Contact ID',i:'#'},
    {id:'notes',l:'Notes',i:'✎'}
  ];
  document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tb ${S.tab===t.id?'on':'off'}" onclick="gTab('${t.id}')"><div class="tb-dot"></div><span class="tb-ico">${t.i}</span><span class="tb-lbl">${t.l}</span></button>`).join('');
  const m=document.getElementById('main');
  m.className='scroll anim';
  if(S.tab==='home')m.innerHTML=rHome();
  else if(S.tab==='search')m.innerHTML=rSearch();
  else if(S.tab==='diagnose')m.innerHTML=rDiagnose();
  else if(S.tab==='panels')m.innerHTML=rPanels();
  else if(S.tab==='cid')m.innerHTML=rCID();
  else if(S.tab==='notes')m.innerHTML=rNotes();
  m.scrollTop=0;
}

function rHome(){return `<div class="home-head"><div class="home-date">${DAYS[NOW.getDay()]} · ${TODAY}</div><div class="home-title">FA Tech Assist</div><div class="status-pill"><div class="status-dot"></div><span class="status-txt">Ready · All Systems</span></div></div><div class="mod-list"><div class="mod-card" onclick="gTab('search')"><div class="mod-icon-wrap">⌕</div><div class="mod-info"><div class="mod-title">Error Code Lookup</div><div class="mod-desc">Search by fault code, brand, or symptom</div></div><span class="mod-count">${EC.length} codes</span><span class="mod-arrow">›</span></div><div class="mod-card" onclick="gTab('diagnose')"><div class="mod-icon-wrap">⑂</div><div class="mod-info"><div class="mod-title">Guided Diagnostics</div><div class="mod-desc">Step-by-step fault isolation trees</div></div><span class="mod-count">${Object.keys(TR).length} trees</span><span class="mod-arrow">›</span></div><div class="mod-card" onclick="gTab('panels')"><div class="mod-icon-wrap">◫</div><div class="mod-info"><div class="mod-title">Panel Reference</div><div class="mod-desc">Programming steps and gotcha notes</div></div><span class="mod-count">${PNL.length} brands</span><span class="mod-arrow">›</span></div><div class="mod-card" onclick="gTab('cid')"><div class="mod-icon-wrap">#</div><div class="mod-info"><div class="mod-title">Contact ID Decoder</div><div class="mod-desc">Decode monitoring signals instantly</div></div><span class="mod-count">${CID.length} codes</span><span class="mod-arrow">›</span></div><div class="mod-card" onclick="gTab('notes')"><div class="mod-icon-wrap">✎</div><div class="mod-info"><div class="mod-title">Job Notes</div><div class="mod-desc">Log findings, actions, and parts needed</div></div><span class="mod-count">${S.notes.length} sessions</span><span class="mod-arrow">›</span></div></div><div class="qref-wrap"><div class="qref qref-red"><div class="qref-label qref-label-red">⚠ AHJ Notification</div><div class="qref-body">Battery Trouble or AC Loss over 8 hours typically requires AHJ notification. Check local jurisdiction requirements. Document all impairment durations in job notes.</div></div><div class="qref qref-ora"><div class="qref-label qref-label-ora">Before You Start</div><div class="qref-body">Always notify the monitoring company before testing, walking, or resetting any panel. Get a confirmation number and document it in job notes.</div></div></div><div class="version-tag">FA Tech Assist · Encore Fire Protection · v3.0 PWA</div>`;}

function rSearch(){const brands=['All','Notifier','Honeywell/Silent Knight','EST/Edwards','Simplex','Bosch'];const q=S.sq.toLowerCase().trim();const filtered=EC.filter(c=>{const bm=S.sbrand==='All'||c.brand===S.sbrand||c.brand.startsWith(S.sbrand.split('/')[0]);const tm=!q||c.code.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q)||c.causes.some(x=>x.toLowerCase().includes(q))||c.brand.toLowerCase().includes(q);return bm&&tm;});const det=S.scode?rCodeDetail(S.scode):'';return `<div style="position:relative"><div class="search-top"><div class="search-input-wrap"><span style="font-size:16px;color:var(--t3)">⌕</span><input type="text" placeholder="Code, symptom, or brand..." value="${S.sq}" oninput="sSQ(this.value)" /></div></div><div class="chips">${brands.map(b=>`<button class="chip ${S.sbrand===b?'on':''}" onclick="sBrand('${b}')">${b}</button>`).join('')}</div><div class="rlabel">${filtered.length} result${filtered.length!==1?'s':''}</div><div class="rlist">${filtered.length===0?`<div style="padding:24px;text-align:center;color:var(--t3);font-size:14px">No results — try a different search.</div>`:filtered.map(c=>`<div class="rrow" onclick="sSC('${c.id}')"><div class="rsev ${sev2cls(c.sev)}"></div><div style="flex:1;min-width:0"><div class="rcode">${c.code}<span class="rbadge ${sev2badge(c.sev)}">${c.sev}</span></div><div class="rbrand">${c.brand}</div></div><div class="rchev">›</div></div>`).join('')}</div><div class="sp"></div>${det}</div>`;}

function rCodeDetail(id){const c=EC.find(x=>x.id===id);if(!c)return '';return `<div class="detail"><button class="dbtn" onclick="sSC(null)">‹ Back</button><div class="dhead"><div style="margin-bottom:8px"><span class="rbadge ${sev2badge(c.sev)}" style="font-size:11px;padding:3px 8px">${c.sev}</span>${c.nfpa?`<span class="rbadge" style="background:rgba(255,69,0,0.15);color:var(--a);font-size:11px;padding:3px 8px;margin-left:6px">AHJ NOTIFY</span>`:''}</div><div class="dtitle">${c.code}</div><div class="dsub">${c.brand} · ${c.models}</div></div><div class="dsec"><div class="dsec-t">Description</div><div class="dsec-body">${c.desc}</div></div><div class="div-line"></div><div class="dsec"><div class="dsec-t">Common Causes</div>${c.causes.map(x=>`<div class="cause-row"><div class="cause-dot"></div><div class="dsec-body">${x}</div></div>`).join('')}</div><div class="div-line"></div><div class="dsec"><div class="dsec-t">Recommended Steps</div>${c.steps.map((x,i)=>`<div class="step-row"><div class="step-n">${i+1}</div><div class="step-t">${x}</div></div>`).join('')}</div>${c.related.length?`<div class="div-line"></div><div class="dsec"><div class="dsec-t">Related Codes</div><div class="rel-codes">${c.related.map(r=>`<span class="rel-code">${r}</span>`).join('')}</div></div>`:''} ${c.nfpa?`<div class="dsec"><div class="nfpa-box"><div class="nfpa-t">NFPA 72 — This condition may require AHJ notification depending on outage duration and local authority requirements. Document the impairment start time.</div></div></div>`:''}<div class="sp"></div></div>`;}

function rDiagnose(){if(S.dtree&&S.dcur)return rFlow();return `<div class="dg-head"><div class="dg-title">Diagnose</div><div class="dg-sub">Select a fault type to begin</div></div><div class="tree-grid">${Object.entries(TR).map(([k,t])=>`<div class="tc" onclick="sDT('${k}')">${t.isNew?`<div class="tc-new">NEW</div>`:''}<div class="tc-ico">${t.ico}</div><div class="tc-title">${t.title}</div><div class="tc-desc">${t.desc}</div></div>`).join('')}</div><div class="sp"></div>`;}

function rFlow(){const tree=TR[S.dtree];const node=tree.nodes[S.dcur];if(!node)return rDiagnose();const depth=S.dhist.length;const progress=Math.min(depth/9,1);const nav=`<div class="flow-nav"><button class="flow-back" onclick="exitTree()">‹ ${tree.title}</button><span class="flow-step-pill">${node.type==='res'?'Result':`Step ${depth+1}`}</span></div><div class="progress"><div class="progress-fill" style="width:${Math.round(progress*100)}%"></div></div><div class="crumbs"><span class="crumb link" onclick="exitTree()">${tree.ico} ${tree.title}</span>${S.dhist.map((_,i)=>`<span class="crumb-sep">›</span><span class="crumb">${i+1}</span>`).join('')}${node.type!=='res'?`<span class="crumb-sep">›</span><span class="crumb active">${depth+1}</span>`:''}</div>`;
if(node.type==='res'){const sc=resClass(node.sev),rt=resTop(node.sev);return `<div>${nav}<div class="result-banner ${sc}"><div class="result-banner-top ${rt}"></div><div class="result-banner-body"><div class="res-icon-row"><span class="res-ico">${sevIco(node.sev)}</span><div><div class="res-title">${node.title}</div><div class="res-sev-label" style="color:${sevColor(node.sev)}">${sevLabel(node.sev)}</div></div></div><div class="res-body">${node.body}</div>${node.parts&&node.parts.length?`<div class="parts-head">Parts / Tools Needed</div><div class="parts-wrap">${node.parts.map(p=>`<div class="part-tag">${p}</div>`).join('')}</div>`:''}</div></div><div class="res-restart"><button onclick="exitTree()">← Back to Trees</button></div><div class="sp"></div></div>`;}
if(node.type==='yn')return `<div>${nav}<div class="q-card"><div class="q-accent"></div><div class="q-body"><div class="q-label">Step ${depth+1}</div><div class="q-text">${node.q}</div></div></div><div class="yn-row"><button class="yn-btn yn-y" onclick="adv('${node.y}')">✓ Yes</button><button class="yn-btn yn-n" onclick="adv('${node.n}')">✗ No</button></div><div class="esc-btns">${depth>0?`<button class="go-back" onclick="goBack()">← Go Back</button>`:''}<button class="esc-btn" onclick="exitTree()">Escalate / Exit</button></div><div class="sp"></div></div>`;
if(node.type==='ch')return `<div>${nav}<div class="q-card"><div class="q-accent"></div><div class="q-body"><div class="q-label">Step ${depth+1}</div><div class="q-text">${node.q}</div></div></div>${node.opts.map((o,i)=>`<div class="opt" onclick="adv('${o.n}')"><div class="opt-num">${String.fromCharCode(65+i)}</div><div class="opt-text">${o.l}</div><div class="opt-chev">›</div></div>`).join('')}<div class="esc-btns">${depth>0?`<button class="go-back" onclick="goBack()">← Go Back</button>`:''}<button class="esc-btn" onclick="exitTree()">Escalate / Exit</button></div><div class="sp"></div></div>`;
if(node.type==='info')return `<div>${nav}<div class="q-card"><div class="q-accent"></div><div class="q-body"><div class="q-label">Note</div><div class="q-text">${node.q}</div></div></div><div style="padding:0 16px"><button style="width:100%;padding:13px;background:var(--a);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit" onclick="adv('${node.next}')">Continue →</button></div><div class="sp"></div></div>`;
return rDiagnose();}

function rPanels(){if(S.pt!==null&&S.pb!==null&&S.pm!==null)return rTaskDetail();if(S.pm!==null&&S.pb!==null)return rTaskList();return `<div class="dg-head"><div class="dg-title">Panel Ref</div><div class="dg-sub">Programming steps and gotcha notes</div></div><div class="brands-list">${PNL.map((b,bi)=>`<div class="brand-block"><div class="brand-hdr"><div class="brand-ico">⚙</div><div><div class="brand-nm">${b.brand}</div><div class="brand-ct">${b.models.length} model${b.models.length!==1?'s':''} available</div></div></div>${b.models.map((m,mi)=>`<div class="model-r" onclick="sMod(${bi},${mi})"><div><div class="model-nm">${m.name}</div><div class="model-sub">${m.count}</div></div><span style="color:var(--t4)">›</span></div>`).join('')}</div>`).join('')}</div><div class="sp"></div>`;}

function rTaskList(){const b=PNL[S.pb];const m=b.models[S.pm];return `<div><button class="dbtn" onclick="sMod(null,null)">‹ All Panels</button><div class="dg-head" style="padding-top:4px"><div class="dg-title" style="font-size:22px">${m.name}</div><div class="dg-sub">${b.brand}</div></div><div class="task-list-wrap">${m.tasks.map((t,i)=>`<div class="task-r" onclick="sTask(${i})"><div class="task-r-ico ${t.ico==='⚠️'?'task-r-warn':'task-r-ora'}">${t.ico}</div><div style="flex:1"><div class="task-nm">${t.t}</div></div><span style="color:var(--t4)">›</span></div>`).join('')}</div><div class="sp"></div></div>`;}

function rTaskDetail(){const b=PNL[S.pb];const m=b.models[S.pm];const t=m.tasks[S.pt];return `<div><button class="dbtn" onclick="sTask(null)">‹ ${m.name}</button><div class="dg-head" style="padding-top:4px"><div class="dg-title" style="font-size:20px">${t.t}</div><div class="dg-sub">${m.name} · ${b.brand}</div></div><div style="padding:0 16px 16px">${t.warn?`<div class="warn-box"><div class="warn-txt">⚠ ${t.warn}</div></div>`:''} ${t.steps.map((s,i)=>`<div class="step-row"><div class="step-n">${i+1}</div><div class="step-t">${s}</div></div>`).join('')}</div><div class="sp"></div></div>`;}

function rNotes(){if(S.makingSession)return rMakeSession();if(S.noteIdx!==null)return rNoteDetail();return `<div class="dg-head"><div class="dg-title">Job Notes</div><div class="dg-sub">${S.notes.length} session${S.notes.length!==1?'s':''} · ${TODAY}</div></div><div class="notes-list">${S.notes.length===0?`<div class="empty"><div class="empty-ico">✎</div><div class="empty-t">No sessions yet</div><div class="empty-s">Tap + to start a new job session</div></div>`:S.notes.map((n,i)=>`<div class="note-c" onclick="openN(${i})"><div class="note-top"><div class="note-site">${n.site}</div><div class="note-date">${n.date}</div></div><div class="note-job">Job: ${n.job||'—'}</div><div class="note-preview">${n.entries[n.entries.length-1]?.text?.substring(0,80)||''}${(n.entries[n.entries.length-1]?.text?.length||0)>80?'...':''}</div><div>${[...new Set(n.entries.map(e=>e.tag))].map(tag=>`<span class="ntag ntag-${tag[0]}">${tag}</span>`).join('')}</div></div>`).join('')}</div><div class="fab-wrap"><button class="fab" onclick="startS()">+</button></div><div class="sp"></div>`;}

function rMakeSession(){return `<div><button class="dbtn" onclick="cancelS()">‹ Cancel</button><div class="dg-head" style="padding-top:4px"><div class="dg-title" style="font-size:22px">New Session</div></div><div class="form-wrap"><label class="fl">Site Name</label><input class="fi" type="text" placeholder="e.g. Acme Warehouse — Woburn" id="ns-site" /><label class="fl">Job / Order Number <span style="color:var(--t4);font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label><input class="fi" type="text" placeholder="e.g. ST-2024-1150" id="ns-job" /><button class="sbmt" onclick="createS()">Create Session</button><button class="cncl" onclick="cancelS()">Cancel</button></div></div>`;}

function rNoteDetail(){const n=S.notes[S.noteIdx];const tagMap={finding:'f',action:'a',parts:'p',callback:'c'};const borderMap={finding:'var(--blue)',action:'var(--green)',parts:'var(--amber)',callback:'var(--red)'};return `<div><button class="dbtn" onclick="closeN()">‹ All Sessions</button><div class="dg-head" style="padding-top:4px"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px"><div><div class="dg-title" style="font-size:20px">${n.site}</div><div class="dg-sub">Job: ${n.job||'—'} · ${n.date}</div></div><button class="delete-btn" onclick="deleteSession(${S.noteIdx})">Delete</button></div></div><div style="padding:0 16px">${n.entries.map(e=>`<div class="entry-row entry-${tagMap[e.tag]||'f'}"><div class="entry-meta"><span class="entry-time">${e.time}</span><span class="ntag ntag-${tagMap[e.tag]||'f'}">${e.tag}</span></div><div class="entry-text">${e.text}</div></div>`).join('')}${n.entries.length===0?`<div class="empty"><div class="empty-ico">✎</div><div class="empty-t">No entries yet</div><div class="empty-s">Tap + to add your first note</div></div>`:''}</div>${S.addEntry?rAddEntry():`<div class="fab-wrap" style="margin-top:4px"><button class="fab" onclick="togE()">+</button></div>`}<div class="sp"></div></div>`;}

function rAddEntry(){const tags=[{k:'finding',l:'Finding',c:'f'},{k:'action',l:'Action Taken',c:'a'},{k:'parts',l:'Parts Needed',c:'p'},{k:'callback',l:'Callback Required',c:'c'}];return `<div class="form-wrap"><label class="fl">Note</label><textarea class="fta" id="et" placeholder="What did you find or do?" oninput="sNT(this.value)">${S.newText}</textarea><label class="fl">Tag</label><div class="tag-btns">${tags.map(t=>`<button class="tag-btn ${S.newTag===t.k?`sel-${t.c}`:''}" onclick="sTag('${t.k}')">${t.l}</button>`).join('')}</div><button class="sbmt" onclick="saveE()">Add Entry</button><button class="cncl" onclick="togE()">Cancel</button></div>`;}

const CID_GROUPS=[
{label:'Fire Alarms — 110s',codes:['110','111','112','113','114','115','116','117','118','120','162']},
{label:'Fire Supervisory — 200s',codes:['200','201','202','203','204','205','206']},
{label:'System Troubles — 300s',codes:['300','301','302','305','306','309','310','311','312','314']},
{label:'Sounder / NAC Troubles — 320s',codes:['320','321','322','326','327']},
{label:'SLC / Loop Troubles — 330s',codes:['330','331','332','333']},
{label:'Communication Troubles — 350s',codes:['350','351','352','354','356','357']},
{label:'Zone / Sensor Troubles — 370s',codes:['370','371','373','374','380','383','384']},
{label:'Bypasses — 570s',codes:['570','571']},
{label:'Test & Misc — 600s',codes:['601','602','604','607','608','614']},
{label:'Download & Special — 900s',codes:['900','901','902','912','913']},

function cidLookup(code){return CID.find(c=>c.code===code.replace(/[eErR]/g,'').trim());}
function cidSevClass(sev){return {high:'cid-result-high',med:'cid-result-med',low:'cid-result-low',info:'cid-result-info'}[sev]||'cid-result-none';}
function cidTopClass(sev){return {high:'cid-rt-high',med:'cid-rt-med',low:'cid-rt-low',info:'cid-rt-info'}[sev]||'';}
function cidCatClass(sev){return {high:'cid-cat-high',med:'cid-cat-med',low:'cid-cat-low',info:'cid-cat-info'}[sev]||'cid-cat-info';}
function cidCatLabel(cat){return {fire:'Fire Alarm',sup:'Fire Supervisory',trbl:'System Trouble',test:'Test / Misc',misc:'Informational'}[cat]||cat;}
function cidBadgeClass(cat){return {fire:'cid-badge-fire',sup:'cid-badge-sup',trbl:'cid-badge-trbl',test:'cid-badge-test',misc:'cid-badge-misc'}[cat]||'cid-badge-misc';}
function cidRowSevClass(sev){return {high:'cid-sev-high',med:'cid-sev-med',low:'cid-sev-low',info:'cid-sev-info'}[sev]||'cid-sev-info';}

function rCID(){
  const raw=S.cidInput||'';
  const clean=raw.replace(/[^0-9]/g,'').substring(0,3);
  const qual=S.cidQual||'E';
  const match=clean.length===3?cidLookup(clean):null;

  const qualLabel=qual==='E'?'New Event (E)':'Restore / Clear (R)';
  const qualNote=qual==='R'?' — This is a RESTORE signal. The condition has cleared.':'';

  let resultHTML='';
  if(clean.length===3){
    if(match){
      const sc=cidSevClass(match.sev), tc=cidTopClass(match.sev), cc=cidCatClass(match.sev);
      const restoreNote=qual==='R'?`<div style="background:rgba(34,197,94,0.1);border:0.5px solid rgba(34,197,94,0.25);border-radius:10px;padding:10px 12px;margin-top:10px;font-size:13px;color:var(--green);font-weight:600">✓ RESTORE — This condition has cleared at the panel.</div>`:'';
      resultHTML=`<div class="cid-result ${sc}">
        <div class="cid-result-top ${tc}"></div>
        <div class="cid-result-body">
          <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:4px">
            <div class="cid-code-num">${qual}${clean}</div>
            <div style="font-size:11px;color:var(--t3);font-weight:600">${qual==='E'?'New Event':'Restore'}</div>
          </div>
          <div class="cid-code-name">${match.name}</div>
          <div class="cid-code-cat ${cc}">${cidCatLabel(match.cat)}</div>
          <div class="cid-pills">
            ${match.dispatch&&qual==='E'?'<span class="cid-pill cid-pill-dispatch">FD DISPATCH</span>':''}
            ${match.restore?'<span class="cid-pill cid-pill-restore">RESTORE EXPECTED</span>':'<span class="cid-pill cid-pill-norestore">NO RESTORE</span>'}
            ${match.nfpa?'<span class="cid-pill cid-pill-nfpa">NFPA 72 NOTE</span>':''}
          </div>
          <div class="cid-code-desc">${match.desc}${restoreNote?'':qualNote}</div>
          ${restoreNote}
        </div>
      </div>`;
    } else {
      resultHTML=`<div class="cid-result cid-result-none"><div class="cid-result-body"><div class="cid-empty"><div class="cid-code-num" style="color:var(--t3)">${qual}${clean}</div><div class="cid-empty-t" style="margin-top:8px">Code not in FA reference list.<br/>May be a burglar alarm, access control,<br/>or custom manufacturer code.</div></div></div></div>`;
    }
  } else if(clean.length>0){
    resultHTML=`<div class="cid-result cid-result-none"><div class="cid-result-body"><div class="cid-empty"><div class="cid-code-num" style="color:var(--t4);font-size:40px">${qual}${clean}${'_'.repeat(3-clean.length)}</div><div class="cid-empty-t" style="margin-top:8px">Enter 3 digits to decode</div></div></div></div>`;
  } else {
    resultHTML=`<div class="cid-result cid-result-none"><div class="cid-result-body"><div class="cid-empty"><div style="font-size:40px;color:var(--t4);font-family:ui-monospace,monospace;font-weight:800;letter-spacing:0.1em">E___</div><div class="cid-empty-t" style="margin-top:8px">Type a 3-digit Contact ID code<br/>to instantly decode it</div></div></div></div>`;
  }

  const groupHTML=CID_GROUPS.map(g=>{
    const rows=g.codes.map(code=>{
      const c=CID.find(x=>x.code===code);
      if(!c)return '';
      return `<div class="cid-row" onclick="setCIDInput('${c.code}')">
        <div class="cid-row-sev ${cidRowSevClass(c.sev)}"></div>
        <div class="cid-row-code">${c.code}</div>
        <div class="cid-row-name">${c.name}</div>
        <span class="cid-row-badge ${cidBadgeClass(c.cat)}">${cidCatLabel(c.cat).split(' ')[0]}</span>
      </div>`;
    }).join('');
    return `<div class="cid-section"><div class="cid-section-label">${g.label}</div></div><div class="cid-list">${rows}</div>`;
  }).join('');

  return `<div>
    <div class="cid-input-wrap">
      <div class="cid-label">Contact ID Decoder</div>
      <div class="cid-input-row">
        <input class="cid-input" type="tel" maxlength="4" placeholder="110" value="${raw}" oninput="setCIDRaw(this.value)" />
      </div>
      <div class="cid-qual-row">
        <button class="cid-qual ${qual==='E'?'on-e':''}" onclick="setCIDQual('E')">E — New Event</button>
        <button class="cid-qual ${qual==='R'?'on-r':''}" onclick="setCIDQual('R')">R — Restore / Clear</button>
      </div>
    </div>
    ${resultHTML}
    <div class="cid-section"><div class="cid-section-label">Full FA Reference</div></div>
    ${groupHTML}
    <div class="sp"></div>
  </div>`;
}

function gTab(t){S.tab=t;S.scode=null;if(t!=='diagnose'){S.dtree=null;S.dcur=null;S.dhist=[];}if(t!=='panels'){S.pb=null;S.pm=null;S.pt=null;}if(t!=='notes'){S.noteIdx=null;S.addEntry=false;S.makingSession=false;}R();}
function sSQ(v){S.sq=v;R();}
function sBrand(b){S.sbrand=b;R();}
function sSC(id){S.scode=id;document.getElementById('main').scrollTop=0;R();}
function sDT(k){S.dtree=k;S.dhist=[];S.dcur=TR[k].start;R();}
function exitTree(){S.dtree=null;S.dcur=null;S.dhist=[];R();}
function adv(n){S.dhist.push(S.dcur);S.dcur=n;R();}
function goBack(){if(S.dhist.length>0){S.dcur=S.dhist.pop();R();}}
function sMod(bi,mi){S.pb=bi;S.pm=mi;S.pt=null;R();}
function sTask(i){S.pt=i;R();}
function openN(i){S.noteIdx=i;S.addEntry=false;R();}
function closeN(){S.noteIdx=null;S.addEntry=false;R();}
function togE(){S.addEntry=!S.addEntry;S.newText='';R();}
function sNT(v){S.newText=v;}
function sTag(t){S.newTag=t;R();}
function startS(){S.makingSession=true;R();}
function cancelS(){S.makingSession=false;R();}
function deleteSession(i){if(confirm('Delete this session and all its entries?')){S.notes.splice(i,1);saveNotes(S.notes);S.noteIdx=null;R();}}
function createS(){const site=document.getElementById('ns-site')?.value||'';const job=document.getElementById('ns-job')?.value||'';S.notes.unshift({id:Date.now(),site:site||'New Session',job,date:TODAY,entries:[]});saveNotes(S.notes);S.makingSession=false;S.noteIdx=0;R();}
function saveE(){const text=S.newText||document.getElementById('et')?.value||'';if(!text.trim())return;const now=new Date(),h=now.getHours()%12||12,m=now.getMinutes().toString().padStart(2,'0'),ap=now.getHours()>=12?'PM':'AM';S.notes[S.noteIdx].entries.push({time:`${h}:${m} ${ap}`,text:text.trim(),tag:S.newTag});saveNotes(S.notes);S.addEntry=false;S.newText='';R();}
function setCIDRaw(v){S.cidInput=v.replace(/[^0-9]/g,'').substring(0,3);R();}
function setCIDQual(q){S.cidQual=q;R();}
function setCIDInput(code){S.cidInput=code;S.cidQual='E';document.getElementById('main').scrollTop=0;R();}
R();
</script>
