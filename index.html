<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FA Assist"/>
<meta name="theme-color" content="#E63946"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>FA Tech Assist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
:root{
/* v7 Encore palette — brand red primary, navy secondary, alarm red distinct */
--bg:#0E0F14;--s1:#16171E;--s2:#1E2028;--s3:#282A33;--s4:#323440;
--a:#E63946;--a2:rgba(230,57,70,0.12);--a3:rgba(230,57,70,0.06);--a-glow:rgba(230,57,70,0.3);
--b:#3E5C9E;--b2:rgba(62,92,158,0.18);--b3:rgba(62,92,158,0.08);--b-lt:#7A9DE0;
--red:#FF3B30;--red2:rgba(255,59,48,0.1);--amber:#F59E0B;--yellow:#EAB308;--green:#22C55E;--blue:#3B82F6;
--t1:#F5F5F5;--t2:#A8A8AD;--t3:#6E6E73;--t4:#48484A;
--bdr:rgba(255,255,255,0.06);--bdr2:rgba(255,255,255,0.09);--bdr-hi:rgba(255,255,255,0.14);
--safe-top:env(safe-area-inset-top,0px);
--safe-bot:env(safe-area-inset-bottom,0px);
--ease:cubic-bezier(0.32, 0.72, 0, 1);
--ease-quick:cubic-bezier(0.22, 0.61, 0.36, 1);
--mono:'SF Mono',ui-monospace,Menlo,Monaco,monospace;
}
:root.light{
--bg:#F4F4F7;--s1:#FFFFFF;--s2:#EBEBEE;--s3:#E0E0E5;--s4:#D5D5DB;
--a:#C8102E;--a2:rgba(200,16,46,0.1);--a3:rgba(200,16,46,0.05);--a-glow:rgba(200,16,46,0.2);
--b:#1E2749;--b2:rgba(30,39,73,0.1);--b3:rgba(30,39,73,0.04);--b-lt:#3E5C9E;
--red:#D70015;--red2:rgba(215,0,21,0.08);--amber:#B25A00;--yellow:#A17500;--green:#00832D;--blue:#0040DD;
--t1:#111111;--t2:#555555;--t3:#888888;--t4:#AAAAAA;
--bdr:rgba(0,0,0,0.08);--bdr2:rgba(0,0,0,0.12);--bdr-hi:rgba(0,0,0,0.18);
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;color:var(--t1);}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);}
.sb{display:flex;justify-content:space-between;align-items:center;padding:14px 22px 8px;background:var(--bg);flex-shrink:0;}
.sb-t{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-0.2px;}
.sb-r{display:flex;gap:8px;align-items:center;}
.sb-r span{font-size:11px;color:var(--t2);}
.theme-btn{background:none;border:0.5px solid var(--bdr2);border-radius:8px;padding:4px 9px;color:var(--t2);font-size:13px;cursor:pointer;font-family:inherit;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}
.tabbar{display:flex;background:rgba(10,10,10,0.98);border-top:0.5px solid var(--bdr);padding-top:8px;padding-bottom:calc(8px + var(--safe-bot));flex-shrink:0;}
:root.light .tabbar{background:rgba(244,244,244,0.98);}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:3px 2px;border:none;background:none;position:relative;}
.tb-dot{width:4px;height:4px;border-radius:50%;background:var(--a);position:absolute;top:1px;opacity:0;transition:opacity 0.2s;}
.tb.on .tb-dot{opacity:1;}
.tb-ico{font-size:20px;line-height:1;}
.tb-lbl{font-size:9px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;}
.tb.on .tb-lbl{color:var(--a);}
.tb.off .tb-lbl{color:var(--t4);}
.anim{animation:fi 0.15s ease;}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.install-banner{display:none;align-items:center;gap:10px;padding:12px 16px;background:var(--a2);border-bottom:0.5px solid rgba(255,69,0,0.2);}
.install-banner.show{display:flex;}
.install-txt{flex:1;font-size:13px;color:var(--t1);line-height:1.4;}
.install-txt strong{color:var(--a);}
.install-btn{background:var(--a);border:none;border-radius:10px;padding:8px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.install-close{color:var(--t3);font-size:18px;cursor:pointer;flex-shrink:0;}
.pg-head{padding:20px 20px 14px;border-bottom:0.5px solid var(--bdr);}
.pg-title{font-size:28px;font-weight:800;color:var(--t1);letter-spacing:-0.6px;}
.pg-sub{font-size:13px;color:var(--t3);margin-top:3px;}
.back-btn{display:flex;align-items:center;gap:4px;padding:14px 20px 8px;color:var(--a);font-size:15px;font-weight:500;cursor:pointer;border:none;background:none;font-family:inherit;}
.sec-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase;padding:14px 20px 6px;}
.sp{height:28px;}
.card-list{padding:12px 16px;}
.hub-card{background:var(--s1);border:0.5px solid var(--bdr2);border-radius:16px;padding:16px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;-webkit-user-select:none;}
.hub-card:active{background:var(--s2);}
.hub-ico{width:44px;height:44px;border-radius:12px;background:var(--a2);border:0.5px solid rgba(255,69,0,0.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.hub-info{flex:1;min-width:0;}
.hub-title{font-size:15px;font-weight:700;color:var(--t1);}
.hub-desc{font-size:12px;color:var(--t3);margin-top:2px;line-height:1.4;}
.hub-badge{font-size:10px;font-weight:700;color:var(--a);background:var(--a2);padding:3px 8px;border-radius:20px;flex-shrink:0;}
.hub-chev{color:var(--t4);font-size:16px;flex-shrink:0;}
.home-head{padding:22px 22px 0;}
.home-date{font-size:12px;font-weight:600;color:var(--t3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;}
.home-title{font-size:30px;font-weight:800;color:var(--t1);letter-spacing:-0.8px;line-height:1.1;}
.status-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,0.1);border:0.5px solid rgba(34,197,94,0.25);border-radius:20px;padding:5px 12px;margin-top:12px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.status-txt{font-size:12px;color:var(--green);font-weight:600;}
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 16px 0;}
.mod-card{background:var(--s1);border:0.5px solid var(--bdr2);border-radius:16px;padding:16px;cursor:pointer;-webkit-user-select:none;}
.mod-card:active{background:var(--s2);}
.mod-accent{width:24px;height:3px;border-radius:2px;background:var(--a);margin-bottom:10px;}
.mod-title{font-size:14px;font-weight:700;color:var(--t1);}
.mod-desc{font-size:11px;color:var(--t3);margin-top:3px;line-height:1.4;}
.mod-count{font-size:10px;font-weight:700;color:var(--a);background:var(--a2);display:inline-block;padding:2px 8px;border-radius:20px;margin-top:8px;}
.qref-wrap{padding:14px 16px;}
.qref{border-radius:14px;padding:13px 15px;margin-bottom:10px;}
.qref-red{background:rgba(239,68,68,0.07);border:0.5px solid rgba(239,68,68,0.2);}
.qref-ora{background:var(--a3);border:0.5px solid rgba(255,69,0,0.18);}
.qref-label{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px;}
.qref-label-red{color:var(--red);}
.qref-label-ora{color:var(--a);}
.qref-body{font-size:13px;color:var(--t2);line-height:1.5;}
.search-top{padding:12px 16px 8px;background:var(--bg);position:sticky;top:0;z-index:10;border-bottom:0.5px solid var(--bdr);}
.search-input-wrap{display:flex;align-items:center;gap:8px;background:var(--s1);border-radius:12px;padding:10px 14px;border:0.5px solid var(--bdr2);}
.search-input-wrap input{flex:1;background:none;border:none;outline:none;font-size:15px;color:var(--t1);font-family:inherit;}
.search-input-wrap input::placeholder{color:var(--t4);}
.chips{display:flex;gap:8px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:0.5px solid var(--bdr2);background:transparent;color:var(--t3);letter-spacing:0.04em;white-space:nowrap;-webkit-user-select:none;}
.chip.on{background:var(--a);border-color:var(--a);color:#fff;}
.rlabel{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:0.08em;text-transform:uppercase;padding:12px 16px 6px;}
.rlist{margin:0 16px;}
.rrow{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--s1);cursor:pointer;border-bottom:0.5px solid var(--bdr);}
.rrow:first-child{border-radius:14px 14px 0 0;}
.rrow:last-child{border-radius:0 0 14px 14px;border-bottom:none;}
.rrow:only-child{border-radius:14px;}
.rrow:active{background:var(--s2);}
.rsev{width:3px;align-self:stretch;flex-shrink:0;}
.rsev-t{background:var(--yellow);}
.rsev-s{background:var(--amber);}
.rsev-c{background:var(--red);}
.rcode{font-family:ui-monospace,monospace;font-size:14px;font-weight:600;color:var(--t1);}
.rbrand{font-size:11px;color:var(--t3);margin-top:2px;}
.rbadge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;letter-spacing:0.06em;margin-left:6px;}
.rbadge-t{background:rgba(234,179,8,0.15);color:var(--yellow);}
.rbadge-s{background:rgba(245,158,11,0.15);color:var(--amber);}
.rbadge-c{background:rgba(239,68,68,0.15);color:var(--red);}
.rchev{color:var(--t4);font-size:14px;}
.detail{position:absolute;inset:0;background:var(--bg);overflow-y:auto;z-index:50;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.detail::-webkit-scrollbar{display:none;}
.dhead{padding:4px 20px 18px;border-bottom:0.5px solid var(--bdr);}
.dtitle{font-size:26px;font-weight:800;color:var(--t1);letter-spacing:-0.5px;font-family:ui-monospace,monospace;}
.dsub{font-size:13px;color:var(--t3);margin-top:4px;}
.dsec{padding:18px 20px 0;}
.dsec-t{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;}
.dsec-body{font-size:14px;color:var(--t2);line-height:1.6;}
.cause-row{display:flex;gap:10px;margin-bottom:9px;align-items:flex-start;}
.cause-dot{width:6px;height:6px;border-radius:50%;background:var(--a);margin-top:5px;flex-shrink:0;}
.step-row{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start;}
.step-n{width:24px;height:24px;border-radius:50%;background:var(--a);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-t{font-size:14px;color:var(--t1);line-height:1.5;flex:1;}
.div-line{height:0.5px;background:var(--bdr);margin:6px 0;}
.rel-codes{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.rel-code{background:var(--s2);border:0.5px solid var(--bdr2);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--t2);font-family:ui-monospace,monospace;}
.nfpa-box{background:rgba(255,69,0,0.07);border:0.5px solid rgba(255,69,0,0.2);border-radius:12px;padding:12px 14px;margin-top:14px;}
.nfpa-t{font-size:12px;color:var(--a);line-height:1.5;font-weight:500;}
.dg-head{padding:18px 20px 14px;border-bottom:0.5px solid var(--bdr);}
.tree-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px;}
.tc{background:var(--s1);border:0.5px solid var(--bdr2);border-radius:16px;padding:16px;cursor:pointer;-webkit-user-select:none;}
.tc:active{background:var(--s2);}
.tc-ico{font-size:22px;margin-bottom:8px;}
.tc-title{font-size:13px;font-weight:700;color:var(--t1);}
.tc-desc{font-size:11px;color:var(--t3);margin-top:3px;line-height:1.4;}
.tc-new{display:inline-block;font-size:8px;font-weight:800;color:var(--a);background:var(--a2);padding:2px 6px;border-radius:4px;margin-bottom:6px;letter-spacing:0.06em;}
.flow-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;}
.flow-back{display:flex;align-items:center;gap:6px;color:var(--a);font-size:14px;font-weight:600;cursor:pointer;border:none;background:none;font-family:inherit;}
.flow-step-pill{background:var(--s2);border:0.5px solid var(--bdr2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--t2);}
.progress{height:2px;background:var(--s3);margin:0 18px 14px;border-radius:1px;}
.progress-fill{height:100%;background:var(--a);border-radius:1px;transition:width 0.3s;}
.crumbs{display:flex;align-items:center;gap:4px;padding:0 18px 14px;flex-wrap:wrap;}
.crumb{font-size:11px;color:var(--t4);}
.crumb.active{color:var(--t2);}
.crumb.link{color:var(--a);cursor:pointer;}
.crumb-sep{font-size:11px;color:var(--t4);}
.q-card{background:var(--s1);border:0.5px solid var(--bdr2);border-radius:18px;margin:0 16px 14px;overflow:hidden;}
.q-accent{height:3px;background:var(--a);}
.q-body{padding:18px 18px 20px;}
.q-label{font-size:10px;font-weight:700;color:var(--a);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.q-text{font-size:17px;font-weight:600;color:var(--t1);line-height:1.4;}
.yn-row{display:flex;gap:10px;margin:0 16px 10px;}
.yn-btn{flex:1;padding:15px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;}
.yn-y{background:rgba(34,197,94,0.12);color:var(--green);border:0.5px solid rgba(34,197,94,0.25);}
.yn-n{background:rgba(239,68,68,0.12);color:var(--red);border:0.5px solid rgba(239,68,68,0.25);}
.opt{display:flex;align-items:center;gap:12px;background:var(--s1);border:0.5px solid var(--bdr2);border-radius:13px;padding:14px 16px;margin:0 16px 9px;cursor:pointer;-webkit-user-select:none;}
.opt:active{background:var(--s2);}
.opt-num{width:22px;height:22px;border-radius:50%;background:var(--s3);font-size:11px;font-weight:700;color:var(--t2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.opt-text{font-size:14px;color:var(--t1);flex:1;line-height:1.3;}
.opt-chev{color:var(--t4);font-size:14px;}
.esc-btns{margin:4px 16px 0;}
.go-back{width:100%;padding:12px;background:transparent;border:0.5px solid var(--bdr2);border-radius:12px;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px;font-family:inherit;}
.esc-btn{width:100%;padding:12px;background:transparent;border:0.5px solid rgba(239,68,68,0.2);border-radius:12px;color:rgba(239,68,68,0.7);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px;font-family:inherit;}
.result-banner{margin:0 16px 12px;border-radius:16px;overflow:hidden;}
.result-banner-high{background:rgba(239,68,68,0.1);border:0.5px solid rgba(239,68,68,0.25);}
.result-banner-med{background:rgba(245,158,11,0.1);border:0.5px solid rgba(245,158,11,0.25);}
.result-banner-low{background:rgba(34,197,94,0.1);border:0.5px solid rgba(34,197,94,0.25);}
.result-banner-top{height:3px;}
.rb-top-h{background:var(--red);}
.rb-top-m{background:var(--amber);}
.rb-top-l{background:var(--green);}
.result-banner-body{padding:16px 18px;}
.res-icon-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.res-ico{font-size:22px;}
.res-title{font-size:18px;font-weight:800;color:var(--t1);}
.res-sev-label{font-size:11px;font-weight:600;margin-top:2px;}
.res-body{font-size:14px;color:var(--t2);line-height:1.6;white-space:pre-line;}
.parts-head{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:0.08em;text-transform:uppercase;margin-top:14px;margin-bottom:8px;}
.parts-wrap{display:flex;flex-wrap:wrap;gap:8px;}
.part-tag{background:var(--s3);border:0.5px solid var(--bdr2);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--t2);}
.res-restart{display:flex;justify-content:center;padding:6px 0 20px;}
.res-restart button{background:var(--s1);border:0.5px solid var(--bdr2);border-radius:12px;padding:12px 24px;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.brands-list{padding:14px 16px;}
.brand-block{background:var(--s1);border:0.5px solid var(--bdr2);border-radius:16px;overflow:hidden;margin-bottom:10px;}
.brand-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:0.5px solid var(--bdr);}
.brand-ico{width:38px;height:38px;border-radius:10px;background:var(--a2);border:0.5px solid rgba(255,69,0,0.2);display:flex;align-items:center;justify-content:center;font-size:17px;}
.brand-nm{font-size:15px;font-weight:700;color:var(--t1);}
.brand-ct{font-size:11px;color:var(--t3);margin-top:1px;}
.model-r{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:0.5px solid var(--bdr);cursor:pointer;}
.model-r:last-child{border-bottom:none;}
.model-r:active{background:var(--s2);}
.model-nm{font-size:14px;font-weight:600;color:var(--t1);}
.model-sub{font-size:11px;color:var(--t3);margin-top:1px;}
.task-list-wrap{padding:14px 16px;}
.task-r{background:var(--s1);border:0.5px solid var(--bdr2);border-radius:12px;padding:13px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.task-r:active{background:var(--s2);}
.task-r-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.task-r-ora{background:var(--a2);}
.task-r-warn{background:rgba(245,158,11,0.12);}
.task-r-eol{background:rgba(34,197,94,0.12);}
.task-nm{font-size:14px;font-weight:600;color:var(--t1);}
.warn-box{background:rgba(245,158,11,0.08);border:0.5px solid rgba(245,158,11,0.25);border-radius:12px;padding:12px 14px;margin-bottom:14px;}
.warn-txt{font-size:12px;color:var(--amber);line-height:1.5;}
.cid-input-wrap{padding:16px 16px 12px;background:var(--bg);position:sticky;top:0;z-index:10;border-bottom:0.5px solid var(--bdr);}
.cid-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.cid-input{width:100%;background:var(--s1);border:0.5px solid var(--bdr2);border-radius:14px;padding:14px 18px;font-size:32px;font-weight:800;color:var(--t1);outline:none;font-family:ui-monospace,monospace;letter-spacing:0.1em;text-align:center;}
.cid-input:focus{border-color:var(--a);}
.cid-qual-row{display:flex;gap:8px;margin-top:10px;}
.cid-qual{flex:1;padding:8px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:0.5px solid var(--bdr2);background:transparent;color:var(--t3);font-family:inherit;text-align:center;}
.cid-qual.on-e{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.3);color:var(--red);}
.cid-qual.on-r{background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.3);color:var(--green);}
.cid-result{margin:12px 16px 0;border-radius:16px;overflow:hidden;}
.cid-result-high{background:rgba(239,68,68,0.1);border:0.5px solid rgba(239,68,68,0.25);}

/* ================================================================
   v7 ADDITIONS — Encore field-instrument aesthetic
================================================================ */

/* Ambient atmosphere (kills dead-flat look) */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at top,rgba(230,57,70,0.04) 0%,transparent 45%),
    radial-gradient(ellipse at bottom,rgba(62,92,158,0.035) 0%,transparent 45%);
}
:root.light body::before{
  background:
    radial-gradient(ellipse at top,rgba(200,16,46,0.03) 0%,transparent 45%),
    radial-gradient(ellipse at bottom,rgba(30,39,73,0.02) 0%,transparent 45%);
}
#app{position:relative;z-index:1;}

/* Apply spring easing globally to common transitions */
.tb,.hub-card,.mod-card,.task-r,.chip,.theme-btn,.install-btn{
  transition:transform 0.15s var(--ease-quick), background 0.15s var(--ease-quick), color 0.2s var(--ease);
}
.hub-card:active,.mod-card:active,.task-r:active{transform:scale(0.985);}
.tb:active{transform:scale(0.94);}

/* Tabbar: backdrop blur + thin top-highlight border */
.tabbar{
  background:rgba(14,15,20,0.72);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border-top:0.5px solid var(--bdr-hi);
}
:root.light .tabbar{
  background:rgba(244,244,247,0.78);
}
/* Active tab indicator bar */
.tb{position:relative;}
.tb::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%) scaleX(0);
  width:24px;height:2px;background:var(--a);border-radius:0 0 2px 2px;
  box-shadow:0 0 6px var(--a-glow);
  transition:transform 0.32s var(--ease);
}
.tb.on::after{transform:translateX(-50%) scaleX(1);}

/* Status bar: brand mark refinement */
.sb{padding:14px 20px 10px;position:relative;z-index:20;}
.sb-t{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:0.08em;color:var(--t2);text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.sb-t::before{
  content:'';width:6px;height:6px;border-radius:1px;background:var(--a);
  box-shadow:0 0 8px var(--a-glow);
  flex-shrink:0;
}
.sb-r{gap:6px;}

/* Mode toggle — Quick / Study (pill slider) */
.mode-toggle{
  display:flex;background:var(--s1);border:0.5px solid var(--bdr2);
  border-radius:8px;padding:2px;position:relative;overflow:hidden;
}
.mode-toggle-bg{
  position:absolute;top:2px;left:2px;bottom:2px;
  background:var(--a2);border:0.5px solid rgba(230,57,70,0.3);
  border-radius:6px;
  width:calc(50% - 2px);
  transition:transform 0.32s var(--ease);
  z-index:1;
}
.mode-btn{
  background:none;border:none;padding:4px 9px;color:var(--t3);
  font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  cursor:pointer;border-radius:6px;
  transition:color 0.2s var(--ease);
  display:flex;align-items:center;gap:4px;
  position:relative;z-index:2;min-width:62px;justify-content:center;
}
.mode-btn.active{color:var(--a);}
.mode-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* Theme button — smaller, mono */
.theme-btn{
  background:var(--s1);border:0.5px solid var(--bdr2);border-radius:8px;
  padding:4px 9px;color:var(--t2);font-size:14px;cursor:pointer;
  font-family:inherit;min-height:28px;min-width:32px;
}
.theme-btn:active{transform:scale(0.94);background:var(--s2);}

/* Connection status: mono */
#conn-status{font-family:var(--mono)!important;font-size:10px!important;letter-spacing:0.06em;text-transform:uppercase;}

/* ---------------- QUICK MODE VIEW ---------------- */
.qm-view{display:none;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.qm-view::-webkit-scrollbar{display:none;}
.qm-view.on{display:block;animation:qmFade 0.4s var(--ease);}
@keyframes qmFade{from{opacity:0;transform:scale(0.98);}to{opacity:1;transform:scale(1);}}

.qm-head{padding:16px 22px 8px;}
.qm-eyebrow{
  font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.14em;
  color:var(--a);text-transform:uppercase;
  display:flex;align-items:center;gap:6px;margin-bottom:4px;
}
.qm-eyebrow::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:var(--a);box-shadow:0 0 8px var(--a-glow);
}
.qm-title{font-size:28px;font-weight:800;color:var(--t1);letter-spacing:-0.02em;line-height:1.05;}
.qm-sub{font-size:13px;color:var(--t3);margin-top:4px;}

.qm-search{
  margin:14px 16px 0;background:var(--s1);border:0.5px solid var(--bdr-hi);
  border-radius:14px;padding:14px 16px;
  display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;
}
.qm-search::before{
  content:'';position:absolute;inset:0 0 auto 0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
}
.qm-search svg{width:18px;height:18px;color:var(--t3);stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.qm-search input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-family:-apple-system,sans-serif;font-size:16px;}
.qm-search input::placeholder{color:var(--t4);}
.qm-search-kbd{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.06em;color:var(--t3);background:var(--s3);border:0.5px solid var(--bdr2);padding:3px 7px;border-radius:5px;flex-shrink:0;}

.qm-grid{padding:18px 16px 8px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.qm-tile{
  background:var(--s1);border:0.5px solid var(--bdr2);border-radius:14px;padding:16px;
  cursor:pointer;position:relative;overflow:hidden;min-height:104px;
  display:flex;flex-direction:column;justify-content:space-between;
  transition:transform 0.15s var(--ease-quick);
  -webkit-user-select:none;
}
.qm-tile::before{
  content:'';position:absolute;inset:0 0 auto 0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
}
.qm-tile:active{transform:scale(0.97);}
.qm-tile-head{display:flex;justify-content:space-between;align-items:start;}
.qm-tile-ico{
  width:28px;height:28px;border-radius:8px;background:var(--s3);border:0.5px solid var(--bdr2);
  display:flex;align-items:center;justify-content:center;color:var(--a);flex-shrink:0;
}
.qm-tile-ico svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.qm-tile-tag{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--t3);flex-shrink:0;}
.qm-tile-body{margin-top:12px;min-width:0;}
.qm-tile-val{
  font-family:var(--mono);font-size:16px;font-weight:700;color:var(--t1);
  letter-spacing:-0.01em;font-variant-numeric:tabular-nums;line-height:1.1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.qm-tile-lbl{font-size:12px;color:var(--t2);margin-top:4px;line-height:1.3;}
.qm-tile.code .qm-tile-val{color:var(--red);}
.qm-tile.code .qm-tile-ico{color:var(--red);background:var(--red2);border-color:rgba(255,59,48,0.22);}
.qm-tile.ref .qm-tile-val{color:var(--a);}
.qm-tile.tool .qm-tile-val{color:var(--green);}
.qm-tile.tool .qm-tile-ico{color:var(--green);background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.22);}
.qm-tile.nfpa .qm-tile-val{color:var(--b-lt);}
.qm-tile.nfpa .qm-tile-ico{color:var(--b-lt);background:var(--b3);border-color:rgba(62,92,158,0.25);}
.qm-tile-empty{
  background:transparent;border:0.5px dashed var(--bdr2);color:var(--t4);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;gap:4px;
}
.qm-tile-empty svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;}

.qm-rec-title{padding:16px 20px 8px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.12em;color:var(--t3);text-transform:uppercase;}
.qm-rec-list{padding:0 16px;}
.qm-rec-item{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--s1);border:0.5px solid var(--bdr);border-radius:10px;
  margin-bottom:6px;cursor:pointer;
  transition:background 0.15s var(--ease-quick);
}
.qm-rec-item:active{background:var(--s2);}
.qm-rec-type{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.06em;padding:2px 6px;border-radius:4px;flex-shrink:0;}
.qm-rec-type.code{background:var(--red2);color:var(--red);border:0.5px solid rgba(255,59,48,0.22);}
.qm-rec-type.ref{background:var(--a2);color:var(--a);border:0.5px solid rgba(230,57,70,0.22);}
.qm-rec-type.tool{background:rgba(34,197,94,0.1);color:var(--green);border:0.5px solid rgba(34,197,94,0.22);}
.qm-rec-type.nfpa{background:var(--b2);color:var(--b-lt);border:0.5px solid rgba(62,92,158,0.3);}
.qm-rec-text{flex:1;font-size:13px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qm-rec-time{font-family:var(--mono);font-size:10px;color:var(--t3);font-variant-numeric:tabular-nums;flex-shrink:0;}
.qm-empty-recents{text-align:center;padding:32px 20px;color:var(--t4);font-size:12px;font-family:var(--mono);letter-spacing:0.06em;text-transform:uppercase;}

/* Search results inside Quick Mode */
.qm-results{padding:8px 16px 4px;}
.qm-result-group{margin-bottom:14px;}
.qm-result-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.12em;color:var(--t3);text-transform:uppercase;padding:4px 6px 8px;display:flex;align-items:center;gap:8px;}
.qm-result-label-rule{flex:1;height:0.5px;background:var(--bdr);}
.qm-result-count{font-family:var(--mono);font-size:10px;color:var(--t4);}

/* Pin button on reference cards */
.pin-btn{
  background:var(--s2);border:0.5px solid var(--bdr2);border-radius:8px;
  padding:5px 10px;color:var(--t3);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  transition:all 0.15s var(--ease-quick);
}
.pin-btn:active{transform:scale(0.96);}
.pin-btn.pinned{background:var(--a2);border-color:rgba(230,57,70,0.3);color:var(--a);}
.pin-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.pin-btn.pinned svg{fill:currentColor;}

/* Mono treatment for tech values across the app */
.home-title,.pg-title,.dtitle{letter-spacing:-0.02em;}
.version-tag{font-family:var(--mono);letter-spacing:0.08em;text-transform:uppercase;font-size:10px;}
.home-date{font-family:var(--mono);}
.mod-count{font-family:var(--mono);letter-spacing:0.04em;}

/* qref (quick reference blocks) refinements */
.qref-ora{background:var(--b3);border:0.5px solid rgba(62,92,158,0.2);}
.qref-label-ora{color:var(--b-lt);}

/* Install banner uses brand red */
.install-banner{background:var(--a2);border-bottom:0.5px solid rgba(230,57,70,0.22);}
.install-txt strong{color:var(--a);}
.install-btn{background:var(--a);}
.install-btn:active{transform:scale(0.96);}

/* Stagger fade for grid children on tab switch */
.anim > div > .mod-grid > *,
.anim > div > .card-list > *{
  animation:fiStagger 0.35s var(--ease) backwards;
}
.anim > div > .mod-grid > *:nth-child(1),
.anim > div > .card-list > *:nth-child(1){animation-delay:0.04s;}
.anim > div > .mod-grid > *:nth-child(2),
.anim > div > .card-list > *:nth-child(2){animation-delay:0.08s;}
.anim > div > .mod-grid > *:nth-child(3),
.anim > div > .card-list > *:nth-child(3){animation-delay:0.12s;}
.anim > div > .mod-grid > *:nth-child(4),
.anim > div > .card-list > *:nth-child(4){animation-delay:0.16s;}
@keyframes fiStagger{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
