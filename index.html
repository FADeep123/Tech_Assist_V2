  pin:'<svg viewBox="0 0 24 24"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24z"/></svg>',
  plus:'<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
};

function setMode(mode){
  if(S.mode===mode)return;
  haptic(12);
  S.mode=mode;
  localStorage.setItem('fa_mode',mode);
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  const bg=document.getElementById('modeBg');
  if(bg){
    bg.style.transform=mode==='study'?'translateX(0)':'translateX(100%)';
  }
  applyModeView();
}

function applyModeView(){
  const main=document.getElementById('main');
  const qm=document.getElementById('qmView');
  const tabs=document.getElementById('tabs');
  if(S.mode==='quick'){
    main.style.display='none';
    tabs.style.display='none';
    qm.classList.add('on');
    renderQuickMode();
  } else {
    main.style.display='';
    tabs.style.display='';
    qm.classList.remove('on');
  }
  // Position mode pill correctly on first render
  const bg=document.getElementById('modeBg');
  if(bg)bg.style.transform=S.mode==='study'?'translateX(0)':'translateX(100%)';
}

/* ---------- PINNING ---------- */
function pinItem(type,id,label,sublabel,targetValue){
  const key=type+':'+id;
  const existing=S.pins.findIndex(p=>p.key===key);
  if(existing>=0){
    S.pins.splice(existing,1);
  } else {
    if(S.pins.length>=6){S.pins.shift();}
    S.pins.push({key,type,id,label,sublabel,targetValue,ts:Date.now()});
  }
  localStorage.setItem('fa_pins',JSON.stringify(S.pins));
  R();
}
function isPinned(type,id){return S.pins.some(p=>p.key===type+':'+id);}

function addRecent(type,id,label,sublabel){
  const key=type+':'+id;
  S.recents=S.recents.filter(r=>r.key!==key);
  S.recents.unshift({key,type,id,label,sublabel,ts:Date.now()});
  if(S.recents.length>20)S.recents=S.recents.slice(0,20);
  localStorage.setItem('fa_recents',JSON.stringify(S.recents));
}

function timeAgo(ts){
  const d=Date.now()-ts;
  if(d<60000)return 'Now';
  if(d<3600000)return Math.floor(d/60000)+'m';
  if(d<86400000)return Math.floor(d/3600000)+'h';
  if(d<172800000)return 'Yest';
  return Math.floor(d/86400000)+'d';
}

/* ---------- QUICK MODE RENDER ---------- */
function renderQuickMode(){
  const qm=document.getElementById('qmView');
  const q=(S.qmSearch||'').trim().toLowerCase();

  let bodyHtml='';
  if(q.length>=2){
    bodyHtml=renderQuickSearch(q);
  } else {
    bodyHtml=renderQuickHome();
  }

  qm.innerHTML=`
    <div class="qm-head">
      <div class="qm-eyebrow">Quick Mode</div>
      <div class="qm-title">What do you need?</div>
      <div class="qm-sub">Search everything · Pins and recents below</div>
    </div>
    <div class="qm-search">
      ${QM_ICONS.search}
      <input id="qmSearchInput" placeholder="Search codes, values, tools..." value="${escapeAttr(S.qmSearch)}" oninput="updateQmSearch(this.value)"/>
      ${S.qmSearch?'<span class="qm-search-kbd" onclick="clearQmSearch()" style="cursor:pointer">CLR</span>':'<span class="qm-search-kbd">GO</span>'}
    </div>
    ${bodyHtml}
    <div style="height:40px;"></div>
  `;
  // Preserve focus on input if typing
  const inp=document.getElementById('qmSearchInput');
  if(inp && document.activeElement!==inp && q.length>0){
    // Don't steal focus after paint
  }
}

function escapeAttr(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function updateQmSearch(v){
  S.qmSearch=v;
  // Re-render only the results area to preserve input focus
  const qm=document.getElementById('qmView');
  const q=(v||'').trim().toLowerCase();
  // Simple approach: re-render and refocus
  renderQuickMode();
  const inp=document.getElementById('qmSearchInput');
  if(inp){
    inp.focus();
    inp.setSelectionRange(v.length,v.length);
  }
}
function clearQmSearch(){S.qmSearch='';renderQuickMode();}

function renderQuickHome(){
  return `
    ${renderQuickTiles()}
    ${renderQuickRecents()}
  `;
}

function renderQuickTiles(){
  const tiles=[];
  // Slot 1–6: from pins, fill with sensible defaults if under 6
  const defaults=[
    {type:'tool',id:'timer',label:'Impairment',sublabel:'4-hr fire watch',iconKey:'clock',tileClass:'tool'},
    {type:'tool',id:'calc-volt',label:'Voltage Drop',sublabel:'NAC wire sizing',iconKey:'calc',tileClass:'tool'},
    {type:'ref',id:'eol-notifier',label:'2.2kΩ',sublabel:'Notifier onboard NAC',iconKey:'zap',tileClass:'ref'},
    {type:'ref',id:'eol-simplex',label:'10kΩ',sublabel:'Simplex NAC',iconKey:'zap',tileClass:'ref'},
    {type:'code',id:'N001',label:'GND FAULT',sublabel:'Notifier · common',iconKey:'alert',tileClass:'code'},
    {type:'code',id:'N007',label:'NAC OPEN',sublabel:'Notifier · NAC fault',iconKey:'alert',tileClass:'code'}
  ];
  const items=[...S.pins];
  for(const d of defaults){
    if(items.length>=6)break;
    if(!items.some(p=>p.type===d.type && p.id===d.id)){
      items.push(d);
    }
  }
  const tileEls=items.slice(0,6).map(item=>{
    const iconKey=item.iconKey||(item.type==='code'?'alert':item.type==='ref'?'zap':item.type==='tool'?'calc':'file');
    const tileClass=item.tileClass||(item.type==='code'?'code':item.type==='ref'?'ref':item.type==='tool'?'tool':item.type==='nfpa'?'nfpa':'');
    const tag=item.type==='code'?'Error':item.type==='ref'?'EOL':item.type==='tool'?'Tool':item.type==='nfpa'?'NFPA':'Pin';
    return `<div class="qm-tile ${tileClass}" onclick="openQmTile('${item.type}','${item.id}')">
      <div class="qm-tile-head">
        <div class="qm-tile-ico">${QM_ICONS[iconKey]||QM_ICONS.zap}</div>
        <div class="qm-tile-tag">${tag}</div>
      </div>
      <div class="qm-tile-body">
        <div class="qm-tile-val">${escapeAttr(item.label)}</div>
        <div class="qm-tile-lbl">${escapeAttr(item.sublabel||'')}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="qm-grid">${tileEls}</div>`;
}

function renderQuickRecents(){
  if(S.recents.length===0){
    return `<div class="qm-rec-title">Recent</div>
      <div class="qm-empty-recents">No recent items yet — browse Study Mode to populate</div>`;
  }
  const items=S.recents.slice(0,5).map(r=>{
    const cls=r.type==='code'?'code':r.type==='ref'?'ref':r.type==='tool'?'tool':r.type==='nfpa'?'nfpa':'ref';
    const tag=r.type==='code'?'ERR':r.type==='ref'?'REF':r.type==='tool'?'TOOL':r.type==='nfpa'?'NFPA':'REF';
    return `<div class="qm-rec-item" onclick="openQmTile('${r.type}','${r.id}')">
      <span class="qm-rec-type ${cls}">${tag}</span>
      <span class="qm-rec-text">${escapeAttr(r.label)}${r.sublabel?' · '+escapeAttr(r.sublabel):''}</span>
      <span class="qm-rec-time">${timeAgo(r.ts)}</span>
    </div>`;
  }).join('');
  return `<div class="qm-rec-title">Recent</div><div class="qm-rec-list">${items}</div>`;
}

/* Quick Mode search — hits codes, EOL refs, tools, NFPA */
function renderQuickSearch(q){
  const codeHits=EC.filter(c=>
    c.code.toLowerCase().includes(q)||
    c.brand.toLowerCase().includes(q)||
    c.desc.toLowerCase().includes(q)||
    (c.symptoms||[]).some(s=>s.toLowerCase().includes(q))
  ).slice(0,6);

  // EOL/panel hits from PNL data
  const refHits=[];
  try{
    for(const b of (typeof PNL!=='undefined'?PNL:[])){
      for(const m of b.models){
        for(const t of m.tasks){
          const hay=(t.t+' '+(t.rows?JSON.stringify(t.rows):'')+' '+(t.warn||'')+' '+(t.steps?t.steps.join(' '):'')).toLowerCase();
          if(hay.includes(q)){
            refHits.push({brand:b.brand,model:m.name,task:t.t,pb:PNL.indexOf(b),pm:b.models.indexOf(m),pt:m.tasks.indexOf(t),isEol:t.eol});
            if(refHits.length>=6)break;
          }
        }
        if(refHits.length>=6)break;
      }
      if(refHits.length>=6)break;
    }
  }catch(e){}

  // Tool hits
  const tools=[
    {id:'calc-nac',label:'NAC Load Calculator',k:'nac load current amperage'},
    {id:'calc-batt',label:'Battery Calculator',k:'battery ah standby alarm sizing'},
    {id:'calc-volt',label:'Voltage Drop Calculator',k:'voltage drop wire gauge awg length'},
    {id:'calc-eol',label:'EOL Checker',k:'eol end of line resistor reading'},
    {id:'timer',label:'Impairment Timer',k:'impairment timer fire watch ahj'}
  ];
  const toolHits=tools.filter(t=>t.label.toLowerCase().includes(q)||t.k.includes(q));

  // NFPA hits
  const nfpaHits=[];
  try{
    if(typeof NFPA!=='undefined'){
      for(const section of NFPA){
        for(const item of section.items){
          const hay=(section.ref+' '+section.sec+' '+item.label+' '+(item.note||'')).toLowerCase();
          if(hay.includes(q)){
            nfpaHits.push({id:section.ref+'-'+item.label,label:section.ref,sublabel:item.label+' · '+(item.val||'')});
            if(nfpaHits.length>=5)break;
          }
        }
        if(nfpaHits.length>=5)break;
      }
    }
  }catch(e){}

  const totalHits=codeHits.length+refHits.length+toolHits.length+nfpaHits.length;
  if(totalHits===0){
    return `<div class="qm-empty-recents" style="padding:48px 20px;">No matches for "${escapeAttr(q)}"</div>`;
  }

  let html='<div class="qm-results">';
  if(codeHits.length){
    html+=`<div class="qm-result-group">
      <div class="qm-result-label"><span>Error Codes</span><div class="qm-result-label-rule"></div><span class="qm-result-count">${codeHits.length}</span></div>
      <div class="qm-rec-list">${codeHits.map(c=>`<div class="qm-rec-item" onclick="openQmTile('code','${c.id}')"><span class="qm-rec-type code">ERR</span><span class="qm-rec-text">${c.code} · ${c.brand}</span><span class="qm-rec-time">${c.sev.slice(0,4)}</span></div>`).join('')}</div>
    </div>`;
  }
  if(refHits.length){
    html+=`<div class="qm-result-group">
      <div class="qm-result-label"><span>Reference</span><div class="qm-result-label-rule"></div><span class="qm-result-count">${refHits.length}</span></div>
      <div class="qm-rec-list">${refHits.map(r=>`<div class="qm-rec-item" onclick="openQmRef(${r.pb},${r.pm},${r.pt})"><span class="qm-rec-type ref">${r.isEol?'EOL':'REF'}</span><span class="qm-rec-text">${r.brand} · ${r.model} · ${r.task}</span><span class="qm-rec-time">›</span></div>`).join('')}</div>
    </div>`;
  }
  if(toolHits.length){
    html+=`<div class="qm-result-group">
      <div class="qm-result-label"><span>Tools</span><div class="qm-result-label-rule"></div><span class="qm-result-count">${toolHits.length}</span></div>
      <div class="qm-rec-list">${toolHits.map(t=>`<div class="qm-rec-item" onclick="openQmTile('tool','${t.id}')"><span class="qm-rec-type tool">TOOL</span><span class="qm-rec-text">${t.label}</span><span class="qm-rec-time">›</span></div>`).join('')}</div>
    </div>`;
  }
  if(nfpaHits.length){
    html+=`<div class="qm-result-group">
      <div class="qm-result-label"><span>NFPA 72</span><div class="qm-result-label-rule"></div><span class="qm-result-count">${nfpaHits.length}</span></div>
      <div class="qm-rec-list">${nfpaHits.map(n=>`<div class="qm-rec-item" onclick="openQmTile('nfpa','${n.id}')"><span class="qm-rec-type nfpa">NFPA</span><span class="qm-rec-text">${n.label} — ${escapeAttr(n.sublabel)}</span><span class="qm-rec-time">›</span></div>`).join('')}</div>
    </div>`;
  }
  html+='</div>';
  return html;
}

/* Open a tile or search result — route into Study Mode at the right place */
function openQmTile(type,id){
  haptic(15);
  S.mode='study';
  localStorage.setItem('fa_mode','study');
  if(type==='code'){
    const c=EC.find(x=>x.id===id);
    if(c){
      S.tab='reference';S.refSub='codes';S.scode=id;S.sq='';S.sbrand=c.brand;
      addRecent('code',id,c.code,c.brand);
    }
  } else if(type==='ref'){
    // For EOL quick references — map known default IDs to PNL locations
    S.tab='reference';S.refSub='panels';
    const map={
      'eol-notifier':{pb:0,pm:0,pt:0},
      'eol-simplex':{pb:null,pm:null,pt:null}
    };
    // Try to find Simplex programmatically
    if(id==='eol-simplex' && typeof PNL!=='undefined'){
      const bi=PNL.findIndex(b=>b.brand==='Simplex');
      if(bi>=0){S.pb=bi;S.pm=0;S.pt=0;addRecent('ref',id,'Simplex NAC EOL','10kΩ');}
    } else if(map[id] && map[id].pb!==null){
      S.pb=map[id].pb;S.pm=map[id].pm;S.pt=map[id].pt;
      addRecent('ref',id,'Notifier NAC EOL','2.2kΩ');
    } else {
      S.pb=null;S.pm=null;S.pt=null;
    }
  } else if(type==='tool'){
    S.tab='tools';
    if(id==='timer'){S.toolSub='timer';addRecent('tool',id,'Impairment Timer','4-hr fire watch');}
    else if(id==='calc-nac'){S.toolSub='calc';S.calcTab='nac';addRecent('tool',id,'NAC Load Calc','Amperage sizing');}
    else if(id==='calc-batt'){S.toolSub='calc';S.calcTab='batt';addRecent('tool',id,'Battery Calc','AH sizing');}
    else if(id==='calc-volt'){S.toolSub='calc';S.calcTab='volt';addRecent('tool',id,'Voltage Drop','Wire gauge');}
    else if(id==='calc-eol'){S.toolSub='calc';S.calcTab='eol';addRecent('tool',id,'EOL Checker','Resistance reading');}
    else {S.toolSub='calc';}
  } else if(type==='nfpa'){
    S.tab='reference';S.refSub='nfpa';S.nfpaDetail=null;
    addRecent('nfpa',id,'NFPA 72',id);
  }
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode==='study'));
  R();
}

function openQmRef(pb,pm,pt){
  haptic(15);
  S.mode='study';
  localStorage.setItem('fa_mode','study');
  S.tab='reference';S.refSub='panels';
  S.pb=pb;S.pm=pm;S.pt=pt;
  try{
    const b=PNL[pb],m=b.models[pm],t=m.tasks[pt];
    addRecent('ref','pnl-'+pb+'-'+pm+'-'+pt,t.t,b.brand+' · '+m.name);
  }catch(e){}
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode==='study'));
  R();
}

/* Haptic feedback on taps — delegated */
document.addEventListener('touchstart',function(e){
  const target=e.target.closest('button, .hub-card, .mod-card, .task-r, .chip, .qm-tile, .qm-rec-item, .tb, .pin-btn, .grp-row');
  if(target)haptic(6);
},{passive:true});

applyTheme();
R();
</script>
